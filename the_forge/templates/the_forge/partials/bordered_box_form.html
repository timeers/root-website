{% load static %}
<div class="forge-inline-form" data-inline-form="box">
  <form method="post"
        data-add-url="{% url 'forge-box-add' step_pk=step_pk %}"
        data-target=".phase-step-children[data-step-id='{{ step_pk }}']">
    {% csrf_token %}
    <div class="d-flex flex-nowrap gap-2 align-items-center mb-1">
      <strong class="me-1 small text-muted flex-shrink-0">New box:</strong>
      <input type="text" name="title" class="form-control form-control-sm flex-grow-1" placeholder="Title" required style="min-width:0;">
      <div class="btn-group btn-group-sm forge-segmented flex-shrink-0" role="group" aria-label="Height">
        {% for value, label in box_height_choices %}
          <input type="radio" class="btn-check" name="height" id="newbox-{{ step_pk }}-{{ value }}"
                 value="{{ value }}" {% if forloop.first %}checked{% endif %}>
          <label class="btn btn-outline-secondary" for="newbox-{{ step_pk }}-{{ value }}">{{ label }}</label>
        {% endfor %}
      </div>
    </div>
    <div class="forge-rich-text">
      <textarea name="body" class="form-control" rows="2" placeholder="Body…"></textarea>
      <div class="d-flex align-items-center gap-2 mt-1 flex-wrap">
        {% include 'the_forge/partials/richtext_toolbar.html' %}
        <div class="ms-auto d-flex gap-2">
          <button type="submit" class="btn btn-sm btn-primary">Save</button>
          <button type="button" class="btn btn-sm btn-outline-secondary" data-cancel-inline-form>Cancel</button>
        </div>
      </div>
    </div>
  </form>
</div>
