{% load static %}
<div class="border rounded p-2 mb-2 character-image-row" data-row data-id="{{ ci.pk }}">
  <form method="post" enctype="multipart/form-data" class="m-0"
        data-edit-url="{% url 'forge-character-image-edit' pk=ci.pk %}"
        data-dirty-form>
    {% csrf_token %}
    <div class="d-flex gap-2 align-items-center flex-wrap">
      <span class="character-image-label luminari text-muted" style="min-width:4.5rem;">Image {{ ci.order }}</span>
      <img src="{{ ci.image.url }}" alt="" class="character-image-current-thumb" style="max-height:60px;max-width:120px;">
      <input type="file" name="image" accept="image/*"
             class="form-control form-control-sm forge-character-image-input"
             style="max-width:220px;">
      <img class="forge-character-image-preview" alt="" hidden style="max-height:60px;max-width:120px;">
      <label class="form-check-label small mb-0 d-flex align-items-center gap-1" style="cursor:pointer;">
        <input type="checkbox" class="form-check-input mt-0" name="in_front"
               value="on" {% if ci.in_front %}checked{% endif %}>
        In front
      </label>
      <div class="ms-auto d-flex gap-2">
        <button type="submit" class="btn btn-sm btn-outline-primary" data-save-btn>Save</button>
        <button type="button" class="btn btn-sm btn-outline-danger"
                data-delete-url="{% url 'forge-character-image-delete' pk=ci.pk %}">Delete</button>
      </div>
    </div>
  </form>
</div>
