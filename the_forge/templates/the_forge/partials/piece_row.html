{% load static %}
<div class="border rounded p-2 mb-2 d-flex align-items-center gap-2" data-row data-id="{{ piece.pk }}">
  <form method="post" enctype="multipart/form-data" data-edit-url="{% url 'forge-piece-edit' pk=piece.pk %}"
        class="row g-2 align-items-center flex-grow-1 m-0">
    {% csrf_token %}
    <div class="col-auto">
      <input type="text" name="name" value="{{ piece.name }}" class="form-control form-control-sm" placeholder="Name" required>
    </div>
    <div class="col-auto">
      <input type="number" name="quantity" value="{{ piece.quantity }}" min="1" max="99" class="form-control form-control-sm" style="width:5rem;">
    </div>
    <div class="col-auto">
      <select name="type" class="form-select form-select-sm">
        <option value="W" {% if piece.type == 'W' %}selected{% endif %}>Warrior</option>
        <option value="B" {% if piece.type == 'B' %}selected{% endif %}>Building</option>
        <option value="T" {% if piece.type == 'T' %}selected{% endif %}>Token</option>
        <option value="C" {% if piece.type == 'C' %}selected{% endif %}>Card</option>
        <option value="O" {% if piece.type == 'O' %}selected{% endif %}>Other</option>
      </select>
    </div>
    <div class="col-auto">
      {% if piece.small_icon %}<img src="{{ piece.small_icon.url }}" style="height:24px;">{% endif %}
      <input type="file" name="small_icon" accept="image/*" class="form-control form-control-sm" style="width:auto;display:inline-block;">
    </div>
    <div class="col-auto"><button type="submit" class="btn btn-sm btn-outline-primary">Save</button></div>
  </form>
  <button type="button" class="btn btn-sm btn-outline-danger"
          data-delete-url="{% url 'forge-piece-delete' pk=piece.pk %}">Delete</button>
</div>
