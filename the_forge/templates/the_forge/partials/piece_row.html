{% load static %}
<div class="border rounded p-2 mb-2 piece-form-container" data-row data-id="{{ piece.pk }}">
  <form method="post" enctype="multipart/form-data" data-edit-url="{% url 'forge-piece-edit' pk=piece.pk %}"
        class="m-0">
    {% csrf_token %}
    <input type="hidden" name="type" value="{{ piece.type }}">
    <div class="d-flex justify-content-center align-items-center gap-2 mb-1">
      {% if piece.small_icon %}
        <img class="lg-faction-icon piece-current-icon" src="{{ piece.small_icon.url }}" alt="{{ piece.name }}">
      {% endif %}
      <img class="lg-faction-icon image-preview" src="" alt="Preview" hidden>
      <label class="file-input-button mb-0">Choose Icon
        <input type="file" name="small_icon" accept="image/*" class="compact-file-input">
      </label>
    </div>
    <div class="d-flex justify-content-center align-items-center gap-1 mb-1">
      <input type="number" name="quantity" value="{{ piece.quantity }}" min="1" max="99" class="form-control form-control-sm form-control-num">
      <input type="text" name="name" value="{{ piece.name }}" class="form-control form-control-sm" placeholder="Name" required style="width: 90px;">
    </div>
    <div class="d-flex justify-content-center align-items-center gap-2 flex-wrap">
      <button type="submit" class="btn btn-sm btn-outline-primary">Save</button>
      <button type="button" class="btn btn-sm btn-outline-danger"
              data-delete-url="{% url 'forge-piece-delete' pk=piece.pk %}"><i class="bi bi-trash3"></i></button>
    </div>
  </form>
</div>
