{% load static forge_text %}
<div class="legend-entry forge-card-row" data-row data-id="{{ row.pk }}" data-kind="legend-row">
  <form method="post" enctype="multipart/form-data"
        data-edit-url="{% url 'forge-legend-row-edit' pk=row.pk %}"
        class="legend-entry__form" data-dirty-form>
    {% csrf_token %}
    <div class="d-flex flex-column flex-md-row gap-3 align-items-stretch align-items-md-start">
      <div class="legend-entry__left" style="flex:0 0 10rem;">
        <input type="text" name="title" value="{{ row.title }}" class="form-control form-control-sm luminari mb-2" placeholder="Title" required>
        {% if row.image %}
          <div class="text-center mb-1">
            <img src="{{ row.image.url }}" alt="" class="img-fluid" style="max-height:5rem;">
          </div>
        {% endif %}
        <input type="file" name="image" accept="image/*" class="form-control form-control-sm">
      </div>
      <div class="legend-entry__right flex-grow-1" style="min-width:0;">
        <div class="forge-rich-text">
          <textarea name="body" class="form-control" rows="3" placeholder="Description…">{{ row.body }}</textarea>
          <div class="d-flex align-items-center gap-2 mt-1 flex-wrap">
            {% include 'the_forge/partials/richtext_toolbar.html' with allowed_buttons='bold,italic,bolditalic,image'|split:',' %}
            <div class="ms-auto d-flex gap-2">
              <button type="submit" class="btn btn-sm btn-outline-primary" data-save-btn>Save</button>
              <button type="button" class="btn btn-sm btn-outline-danger"
                      data-delete-url="{% url 'forge-legend-row-delete' pk=row.pk %}">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
