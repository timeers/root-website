{% load static forge_text %}
<div class="forge-inline-form scale-entry" data-inline-form="scale-row">
  <form method="post"
        data-add-url="{% url 'forge-scale-row-add' scale_pk=scale_pk %}"
        data-target="[data-scale-entries][data-scale-id='{{ scale_pk }}']"
        data-forge-icon-form>
    {% csrf_token %}
    <div class="d-flex gap-2 align-items-center flex-nowrap">
      <input type="text" name="range" class="form-control form-control-sm scale-entry__field scale-entry__field--range" placeholder="Range (ex. 1-2)" required>
      <span class="fw-bold flex-shrink-0">:</span>
      <input type="text" name="result" class="form-control form-control-sm scale-entry__field" data-track-image-input data-required placeholder="Result" required>
      <button type="submit" class="btn btn-sm btn-primary flex-shrink-0">Add</button>
      <button type="button" class="btn btn-sm btn-outline-secondary flex-shrink-0" data-cancel-inline-form>Cancel</button>
    </div>

    <div class="forge-icon-picker" data-forge-icon-picker hidden>
      <div class="forge-icon-picker__panel">
        {% for key in inline_keywords %}
          <button type="button" class="forge-icon-picker__btn" data-icon-key="{{ key }}" title="{{ key }}">
            <img src="{{ inline_images|dict_get:key }}" alt="{{ key }}">
          </button>
        {% endfor %}
      </div>
    </div>
  </form>
</div>
