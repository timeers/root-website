{% load static %}
<div class="border rounded p-2 mb-2 d-flex justify-content-between align-items-center" data-row data-id="{{ track.pk }}">
  <span>
    <strong>{{ track.title }}</strong>
    <span class="small text-muted">({{ track.get_type_display }}, {{ track.num_columns }} col)</span>
  </span>
  <span class="d-flex gap-2">
    <a href="{% url 'forge-track-edit' pk=track.pk %}" class="btn btn-sm btn-outline-primary">Edit</a>
    <button type="button" class="btn btn-sm btn-outline-danger"
            data-delete-url="{% url 'forge-track-delete' pk=track.pk %}">Delete</button>
  </span>
</div>
