<div class="forge-element-color-picker flex-shrink-0" role="radiogroup" aria-label="Color"
     data-element-color-picker>
  <input type="hidden" name="element_color" value="{{ selected }}" data-element-color-value>
  {% for value, label in choices %}
    {% if value == 'secondary' and not secondary_visible %}{% elif value == 'faction' and hide_faction %}{% else %}
      <button type="button"
              class="forge-color-swatch-btn forge-color-swatch--{{ value }}{% if value == selected %} is-selected{% endif %}"
              data-color-value="{{ value }}"
              title="{{ label }}" aria-label="{{ label }}"
              {% if value == 'faction' %}style="background: {{ faction.color|default:'#5B4A8A' }};"{% endif %}
              {% if value == 'secondary' %}style="background: {{ faction.secondary_color|default:'#000000' }};"{% endif %}></button>
    {% endif %}
  {% endfor %}
</div>
