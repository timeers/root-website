{% load static %}
<div class="border rounded p-2 mb-2" data-row data-id="{{ slot.pk }}">
  <form method="post" data-edit-url="{% url 'forge-cardslot-edit' pk=slot.pk %}" class="m-0">
    {% csrf_token %}
    <div class="d-flex gap-2 align-items-center mb-1">
      <input type="number" name="number" value="{{ slot.number }}" class="form-control form-control-sm" style="width:5rem;">
      <input type="text" name="title" value="{{ slot.title|default_if_none:'' }}" class="form-control form-control-sm" placeholder="Title">
      <button type="submit" class="btn btn-sm btn-outline-primary">Save</button>
      <button type="button" class="btn btn-sm btn-outline-danger"
              data-delete-url="{% url 'forge-cardslot-delete' pk=slot.pk %}">Delete</button>
    </div>
    <div class="forge-rich-text">
      <textarea name="body" class="form-control" rows="2">{{ slot.body|default_if_none:'' }}</textarea>
      {% include 'the_forge/partials/richtext_toolbar.html' %}
    </div>
  </form>
</div>
