{% load static %}
<div class="border rounded p-2 mb-2" data-row data-id="{{ box.pk }}">
  <form method="post" data-edit-url="{% url 'forge-contentbox-edit' pk=box.pk %}" class="m-0">
    {% csrf_token %}
    <div class="d-flex gap-2 align-items-center mb-1">
      <input type="text" name="title" value="{{ box.title }}" class="form-control form-control-sm" placeholder="Title">
      <input type="number" name="order" value="{{ box.order }}" class="form-control form-control-sm" style="width:5rem;">
      <button type="submit" class="btn btn-sm btn-outline-primary">Save</button>
      <button type="button" class="btn btn-sm btn-outline-danger"
              data-delete-url="{% url 'forge-contentbox-delete' pk=box.pk %}">Delete</button>
    </div>
    <div class="forge-rich-text">
      <textarea name="text" class="form-control" rows="3">{{ box.text }}</textarea>
      {% include 'the_forge/partials/richtext_toolbar.html' %}
    </div>
  </form>
</div>
