{% load static forge_text %}
<div class="border rounded p-2 mb-2 d-flex gap-2 align-items-start ability-row" data-row data-id="{{ ability.pk }}">
  <span class="ability-grip" title="Drag to reorder" aria-label="Drag to reorder">⋮⋮</span>
  <img src="{% static 'pdf/svg/ability_berry.svg' %}" alt="" class="ability-marker mt-1" style="width:1.25rem; flex-shrink:0;">
  <form method="post" data-edit-url="{% url 'forge-ability-edit' pk=ability.pk %}" class="m-0 flex-grow-1" data-dirty-form>
    {% csrf_token %}
    <input type="hidden" name="order" value="{{ ability.order }}">
    <div class="mb-1">
      <input type="text" name="title" value="{{ ability.title }}" maxlength="{{ max_ability_title }}" class="form-control form-control-sm forge-baskerville-bold" required>
    </div>
    <div class="forge-rich-text">
      <textarea name="body" class="form-control" rows="3"
                data-richtext-cap data-richtext-max="{{ max_ability_body }}">{{ ability.body }}</textarea>
      <div class="d-flex align-items-center gap-2 mt-1 flex-wrap">
        {% include 'the_forge/partials/richtext_toolbar.html' with allowed_buttons='image'|split:',' %}
        <div class="ms-auto d-flex align-items-center gap-2">
          <span class="text-muted small" data-richtext-counter data-richtext-max="{{ max_ability_body }}" hidden>0 / {{ max_ability_body }}</span>
          <button type="submit" class="btn btn-sm btn-outline-primary" data-save-btn>Save</button>
          <button type="button" class="btn btn-sm btn-outline-danger"
                  data-delete-url="{% url 'forge-ability-delete' pk=ability.pk %}">Delete</button>
        </div>
      </div>
    </div>
  </form>
</div>
