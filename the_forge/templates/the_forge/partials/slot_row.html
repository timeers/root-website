{% load static %}
<div class="border rounded p-2 mb-2 d-flex align-items-center gap-2" data-row data-id="{{ slot.pk }}">
  <form method="post" enctype="multipart/form-data" data-edit-url="{% url 'forge-slot-edit' pk=slot.pk %}"
        class="row g-2 align-items-center flex-grow-1 m-0">
    {% csrf_token %}
    <div class="col-auto">r<input type="number" name="row" value="{{ slot.row }}" class="form-control form-control-sm" style="width:4rem;"></div>
    <div class="col-auto">c<input type="number" name="column" value="{{ slot.column }}" class="form-control form-control-sm" style="width:4rem;"></div>
    <div class="col-auto">#<input type="number" name="number" value="{{ slot.number }}" class="form-control form-control-sm" style="width:5rem;"></div>
    <div class="col-auto"><input type="text" name="row_title" value="{{ slot.row_title }}" class="form-control form-control-sm" placeholder="Row title"></div>
    <div class="col-auto"><input type="text" name="content" value="{{ slot.content }}" class="form-control form-control-sm" placeholder="Content (e.g. 1VP)"></div>
    <div class="col-auto"><input type="file" name="background_image" accept="image/*" class="form-control form-control-sm"></div>
    <div class="col-auto"><button type="submit" class="btn btn-sm btn-outline-primary">Save</button></div>
  </form>
  <button type="button" class="btn btn-sm btn-outline-danger"
          data-delete-url="{% url 'forge-slot-delete' pk=slot.pk %}">Delete</button>
</div>
