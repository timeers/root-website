{% load static %}
<div class="border rounded p-2 mb-2" data-row data-id="{{ decree.pk }}">
  <form method="post" data-edit-url="{% url 'forge-decree-edit' pk=decree.pk %}" class="m-0">
    {% csrf_token %}
    <div class="d-flex gap-2 align-items-center mb-1">
      <input type="text" name="title" value="{{ decree.title|default_if_none:'' }}" class="form-control form-control-sm" placeholder="Title" style="max-width:12rem;">
      <input type="text" name="body" value="{{ decree.body|default_if_none:'' }}" class="form-control form-control-sm" placeholder="Body" style="max-width:12rem;">
      <button type="submit" class="btn btn-sm btn-outline-primary">Save</button>
      <button type="button" class="btn btn-sm btn-outline-danger"
              data-delete-url="{% url 'forge-decree-delete' pk=decree.pk %}">Delete</button>
    </div>
  </form>
  <div class="ps-3 mt-2">
    <div class="small text-muted mb-1">Card slots</div>
    <div id="decree-{{ decree.pk }}-slots">
      {% for s in decree.card_slots.all %}
        {% include 'the_forge/partials/card_slot_row.html' with slot=s %}
      {% endfor %}
    </div>
    <form class="mt-1" data-add-url="{% url 'forge-cardslot-add' decree_pk=decree.pk %}" data-target="#decree-{{ decree.pk }}-slots">
      {% csrf_token %}
      <div class="d-flex gap-2 align-items-center mb-1">
        <input type="number" name="number" class="form-control form-control-sm" style="width:5rem;" placeholder="#">
        <input type="text" name="title" class="form-control form-control-sm" placeholder="Title">
        <button type="submit" class="btn btn-sm btn-outline-primary ms-auto">+ Slot</button>
      </div>
      <div class="forge-rich-text">
        <textarea name="body" class="form-control" rows="2" placeholder="Body…"></textarea>
        {% include 'the_forge/partials/richtext_toolbar.html' %}
      </div>
    </form>
  </div>
</div>
