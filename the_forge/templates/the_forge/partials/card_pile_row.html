{% load static %}
<div class="border rounded p-2 mb-2" data-row data-id="{{ pile.pk }}">
  <form method="post" data-edit-url="{% url 'forge-cardpile-edit' pk=pile.pk %}" class="m-0">
    {% csrf_token %}
    <div class="d-flex gap-2 align-items-center mb-1">
      <input type="text" name="title" value="{{ pile.title|default_if_none:'' }}" class="form-control form-control-sm" placeholder="Title" style="max-width:12rem;">
      <input type="number" name="number" value="{{ pile.number }}" class="form-control form-control-sm" style="width:5rem;">
      <button type="submit" class="btn btn-sm btn-outline-primary">Save</button>
      <button type="button" class="btn btn-sm btn-outline-danger"
              data-delete-url="{% url 'forge-cardpile-delete' pk=pile.pk %}">Delete</button>
    </div>
    <div class="forge-rich-text">
      <textarea name="body" class="form-control" rows="2">{{ pile.body|default_if_none:'' }}</textarea>
      {% include 'the_forge/partials/richtext_toolbar.html' %}
    </div>
  </form>
</div>
