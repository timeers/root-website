{% load static %}
<form method="post" data-edit-url="{% url 'forge-decree-edit' pk=decree.pk %}" data-dirty-form class="decree-title-row m-0 mb-2 p-2 rounded" data-row>
  {% csrf_token %}
  <div class="d-flex gap-2 align-items-center flex-wrap">
    <input type="text" name="title" value="{{ decree.title|default_if_none:'' }}"
           class="form-control form-control-sm" placeholder="Title (eg. Decree, Retinue)" style="max-width:16rem;">
    <input type="text" name="body" value="{{ decree.body|default_if_none:'' }}"
           maxlength="52" class="form-control form-control-sm"
           placeholder="Body (optional)" style="max-width:24rem; font-style:italic;">
    <button type="submit" data-save-btn class="btn btn-sm btn-outline-primary">Save</button>
  </div>
</form>
