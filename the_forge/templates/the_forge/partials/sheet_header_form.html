{% load static %}
<div class="card p-3 mb-3 forge-header-row" data-row data-id="{{ sheet.pk }}">
  <form method="post" enctype="multipart/form-data" class="m-0"
        data-edit-url="{% url 'forge-sheet-header-edit' pk=sheet.pk %}"
        data-dirty-form data-forge-header-form>
    {% csrf_token %}

    <div class="forge-header-preview"
         data-faction-color="{{ faction.color|default:'#888888' }}"
         style="--faction-color: {{ faction.color|default:'#888888' }};">
      <div class="forge-header-preview-bar">
        <img class="forge-header-preview-image"
             {% if sheet.header_image %}src="{{ sheet.header_image.url }}"{% else %}hidden{% endif %}
             alt="">
        <div class="forge-header-preview-title luminari{% if sheet.title_text_color == 'black' %} is-text-black{% endif %}"
             data-default-title="{{ faction.faction_name }}">{{ faction.faction_name }}</div>
      </div>
    </div>

    <div class="row g-2 mt-2">
      <div class="col-md-6">
        <label class="form-label small mb-1" for="id_faction_name">Faction Name</label>
        {{ header_form.faction_name }}
      </div>
      <div class="col-md-3">
        <label class="form-label small mb-1 d-block">Title Color</label>
        <div class="btn-group btn-group-sm w-100 forge-title-color-toggle" role="group" aria-label="Title color">
          {% for radio in header_form.title_text_color %}
            <input type="radio" class="btn-check" name="title_text_color"
                   id="id_title_text_color_{{ forloop.counter0 }}"
                   value="{{ radio.data.value }}"
                   {% if radio.data.selected %}checked{% endif %}>
            <label class="btn btn-outline-secondary" for="id_title_text_color_{{ forloop.counter0 }}">
              {{ radio.choice_label }}
            </label>
          {% endfor %}
        </div>
      </div>
      <div class="col-md-3">
        <label class="form-label small mb-1" for="id_header_image">Header Image</label>
        <div class="d-flex align-items-center gap-2">
          {{ header_form.header_image }}
          {{ header_form.clear_header_image }}
          <button type="button"
                  class="btn btn-sm btn-outline-danger forge-header-image-clear-btn"
                  title="Clear header image"
                  aria-label="Clear header image"
                  {% if not sheet.header_image %}hidden{% endif %}>
            &times;
          </button>
        </div>
      </div>
    </div>

    <div class="row g-2 mt-2">
      <div class="col-md-6">
        <label class="form-label small mb-1" for="id_pnp_version">PnP Version</label>
        {{ header_form.pnp_version }}
      </div>
      <div class="col-md-6">
        <label class="form-label small mb-1" for="id_art_by">Art By</label>
        {{ header_form.art_by }}
      </div>
    </div>

    <div class="d-flex justify-content-end mt-2">
      <button type="submit" class="btn btn-sm btn-outline-primary" data-save-btn>Save Header</button>
    </div>
  </form>
</div>

<script src="{% static 'the_keep/legibility.js' %}"></script>
<script>
(function () {
  if (window.__forgeHeaderPreviewBound) return;
  window.__forgeHeaderPreviewBound = true;

  function rootFor(el) {
    return el && el.closest('.forge-header-row');
  }
  function previewIn(root) {
    return root && root.querySelector('.forge-header-preview');
  }
  function applyTitleColor(root) {
    var preview = previewIn(root);
    if (!preview) return;
    var title = preview.querySelector('.forge-header-preview-title');
    var checked = root.querySelector('input[name="title_text_color"]:checked');
    if (!title || !checked) return;
    var mode = checked.value;
    var useBlack;
    if (mode === 'black') useBlack = true;
    else if (mode === 'white') useBlack = false;
    else useBlack = !window.isWhiteTextLegible(preview.dataset.factionColor || '#888888');
    title.classList.toggle('is-text-black', useBlack);
  }

  document.addEventListener('input', function (ev) {
    var input = ev.target;
    if (!input.matches || !input.matches('input[name="faction_name"]')) return;
    var root = rootFor(input);
    var title = root && root.querySelector('.forge-header-preview-title');
    if (!title) return;
    title.textContent = input.value || title.dataset.defaultTitle || '';
  });

  document.addEventListener('change', function (ev) {
    var t = ev.target;
    if (!t.matches) return;
    var root = rootFor(t);
    if (!root) return;
    if (t.matches('input[name="title_text_color"]')) {
      applyTitleColor(root);
    } else if (t.matches('input[name="header_image"]')) {
      var img = root.querySelector('.forge-header-preview-image');
      var file = t.files && t.files[0];
      if (file) {
        if (img) {
          if (img.dataset.objectUrl) URL.revokeObjectURL(img.dataset.objectUrl);
          var url = URL.createObjectURL(file);
          img.dataset.objectUrl = url;
          img.src = url;
          img.removeAttribute('hidden');
        }
        // Picking a new file cancels a pending clear.
        var clearInput = root.querySelector('input[name="clear_header_image"]');
        if (clearInput) clearInput.value = '';
        var clearBtn = root.querySelector('.forge-header-image-clear-btn');
        if (clearBtn) clearBtn.removeAttribute('hidden');
      }
    }
  });

  document.addEventListener('click', function (ev) {
    var btn = ev.target.closest && ev.target.closest('.forge-header-image-clear-btn');
    if (!btn) return;
    var root = rootFor(btn);
    if (!root) return;
    var fileInput = root.querySelector('input[name="header_image"]');
    var clearInput = root.querySelector('input[name="clear_header_image"]');
    var img = root.querySelector('.forge-header-preview-image');
    if (clearInput) clearInput.value = 'true';
    if (fileInput) fileInput.value = '';
    if (img) {
      if (img.dataset.objectUrl) {
        URL.revokeObjectURL(img.dataset.objectUrl);
        delete img.dataset.objectUrl;
      }
      img.removeAttribute('src');
      img.setAttribute('hidden', '');
    }
    btn.setAttribute('hidden', '');
    // Mark the form dirty so Save Header is enabled.
    var form = root.querySelector('form');
    if (form) form.dispatchEvent(new Event('input', { bubbles: true }));
  });

  function initAll() {
    document.querySelectorAll('.forge-header-row').forEach(function (row) {
      applyTitleColor(row);
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAll);
  } else {
    initAll();
  }
  document.addEventListener('forge:row-replaced', initAll);
})();
</script>
