{% load static %}
<div class="border rounded p-2 mb-2" data-row data-id="{{ step.pk }}">
  <form method="post" data-edit-url="{% url 'forge-setup-step-edit' pk=step.pk %}" class="m-0">
    {% csrf_token %}
    <div class="d-flex gap-2 align-items-center mb-1">
      <label class="small mb-0">#
        <input type="number" name="number" value="{{ step.number }}" class="form-control form-control-sm d-inline-block" style="width:4rem;">
      </label>
      <button type="submit" class="btn btn-sm btn-outline-primary ms-auto">Save</button>
      <button type="button" class="btn btn-sm btn-outline-danger"
              data-delete-url="{% url 'forge-setup-step-delete' pk=step.pk %}">Delete</button>
    </div>
    <div class="forge-rich-text">
      <textarea name="text" class="form-control" rows="3">{{ step.text }}</textarea>
      {% include 'the_forge/partials/richtext_toolbar.html' %}
    </div>
  </form>
</div>
