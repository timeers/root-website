// Template selection and deletion (available in both create and edit modes)
function initTemplateClickHandlers() {
    // Handle clicking on template to load it
    document.querySelectorAll('.template-load-trigger').forEach(trigger => {
        // Remove existing handlers to avoid duplicates
        const newTrigger = trigger.cloneNode(true);
        trigger.parentNode.replaceChild(newTrigger, trigger);
    });

    document.querySelectorAll('.template-load-trigger').forEach(trigger => {
        trigger.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();

            const templateItem = this.closest('.template-item');
            const templateId = templateItem.dataset.templateId;

            // Show loading state
            const originalContent = this.innerHTML;
            this.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Loading...';
            this.style.pointerEvents = 'none';

            // Fetch full template data via AJAX
            fetch(`{% url 'get-question-template' template_id=0 %}`.replace('/0/', `/${templateId}/`))
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadQuestionFromTemplate(data);

                        // Close modal
                        const modal = bootstrap.Modal.getInstance(document.getElementById('templateModal'));
                        modal.hide();
                    } else {
                        alert(data.error || 'Failed to load template');
                    }
                })
                .catch(error => {
                    console.error('Error loading template:', error);
                    alert('An error occurred while loading the template');
                })
                .finally(() => {
                    // Restore original content
                    this.innerHTML = originalContent;
                    this.style.pointerEvents = '';
                });
        });
    });

    // Handle delete button clicks
    document.querySelectorAll('.template-delete-btn').forEach(btn => {
        // Remove existing handlers to avoid duplicates
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
    });

    document.querySelectorAll('.template-delete-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();

            const templateId = this.dataset.templateId;
            const templateName = this.dataset.templateName;

            if (!confirm(`Are you sure you want to delete the template "${templateName}"?`)) {
                return;
            }

            // Show loading state
            const originalContent = this.innerHTML;
            this.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            this.disabled = true;

            fetch(`{% url 'delete-question-template' template_id=0 %}`.replace('/0/', `/${templateId}/`), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Remove the template item from the list
                    const templateItem = this.closest('.template-item');
                    templateItem.remove();

                    // Check if list is now empty
                    const templateList = document.getElementById('template-list');
                    if (templateList && !templateList.querySelector('.template-item')) {
                        templateList.innerHTML = '<div class="alert alert-info" id="no-templates-message">No question templates available.</div>';
                    }
                } else {
                    alert(data.error || 'Failed to delete template');
                    this.innerHTML = originalContent;
                    this.disabled = false;
                }
            })
            .catch(error => {
                console.error('Error deleting template:', error);
                alert('An error occurred while deleting the template');
                this.innerHTML = originalContent;
                this.disabled = false;
            });
        });
    });
}

let currentQuestionIdForTemplate = null;

function openSaveTemplateModal(questionId) {
    currentQuestionIdForTemplate = questionId;
    const card = document.querySelector(`[data-question-id="${questionId}"]`);

    // Build summary
    const questionText = card.querySelector('.question-text').value;
    const questionType = card.querySelector('.question-type').value;

    // Validate required fields before opening modal
    if (!questionText.trim() || !questionType) {
        alert('Please fill in the question text and select a question type before saving as a template.');
        return;
    }

    const questionTypeDisplay = questionTypes[questionType] || questionType;
    const required = card.querySelector('.question-required').checked;

    let summaryHtml = `
        <strong>Question:</strong> ${questionText || '(No text)'}<br>
        <strong>Type:</strong> ${questionTypeDisplay}<br>
        <strong>Required:</strong> ${required ? 'Yes' : 'No'}
    `;

    // Add choices summary if applicable
    if (['MC', 'MS', 'RK', 'YN'].includes(questionType)) {
        const choices = card.querySelectorAll('.choice-item input');
        if (choices.length > 0) {
            summaryHtml += `<br><strong>Choices:</strong> ${choices.length} options`;
        }
    }

    document.getElementById('template-question-summary').innerHTML = summaryHtml;
    document.getElementById('template-name').value = '';
    document.getElementById('template-save-error').classList.add('d-none');

    const modal = new bootstrap.Modal(document.getElementById('saveTemplateModal'));
    modal.show();
}

function saveQuestionTemplate() {
    const questionId = currentQuestionIdForTemplate;
    if (!questionId) return;

    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const templateName = document.getElementById('template-name').value.trim();

    if (!templateName) {
        document.getElementById('template-save-error').textContent = 'Please enter a template name.';
        document.getElementById('template-save-error').classList.remove('d-none');
        return;
    }

    // Collect question data
    const questionData = {
        name: templateName,
        text: card.querySelector('.question-text').value,
        question_type: card.querySelector('.question-type').value,
        required: card.querySelector('.question-required').checked,
        help_text: card.querySelector('.question-help').value,
        is_public: document.getElementById('template-is-public')?.checked || false
    };

    // Add type-specific data
    if (['MC', 'MS', 'RK'].includes(questionData.question_type)) {
        const usePostsCheckbox = card.querySelector('.use-post-choices');
        if (usePostsCheckbox && usePostsCheckbox.checked) {
            questionData.post_component = card.querySelector('.post-component-select')?.value;
            questionData.post_selection_mode = card.querySelector('.post-selection-mode:checked')?.value;
            if (questionData.post_selection_mode === 'individual') {
                questionData.post_choices = getSelectedPostIds(questionId);
            }
        } else {
            const choices = [];
            card.querySelectorAll('.choice-item input').forEach(input => {
                if (input.value.trim()) {
                    choices.push(input.value.trim());
                }
            });
            questionData.choices_data = choices;
        }
        // Collect allow_other for MC/MS template saving
        const allowOtherCb = card.querySelector('.allow-other-checkbox');
        if (allowOtherCb) {
            questionData.allow_other = allowOtherCb.checked;
        }
    } else if (questionData.question_type === 'YN') {
        questionData.choices_data = ['Yes', 'No'];
    } else if (questionData.question_type === 'LK') {
        const scaleSelect = card.querySelector('.likert-scale-select');
        questionData.likert_scale_id = scaleSelect ? parseInt(scaleSelect.value) : null;
    } else if (questionData.question_type === 'TA') {
        // Time Availability - collect enabled days
        const dayCheckboxes = card.querySelectorAll('.ta-day-checkbox:checked');
        questionData.ta_enabled_days = Array.from(dayCheckboxes).map(cb => cb.value);
    }

    // Send to backend
    fetch('{% url "save-question-template" %}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify(questionData)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const modal = bootstrap.Modal.getInstance(document.getElementById('saveTemplateModal'));
            modal.hide();

            // Add the new template to the template list
            addTemplateToList(data.template_id, data.template_name, data.template_type_display, data.is_public);

            // Show success message
            alert('Question template saved successfully!');
        } else {
            document.getElementById('template-save-error').textContent = data.error || 'Failed to save template.';
            document.getElementById('template-save-error').classList.remove('d-none');
        }
    })
    .catch(error => {
        console.error('Error saving template:', error);
        document.getElementById('template-save-error').textContent = 'An error occurred while saving.';
        document.getElementById('template-save-error').classList.remove('d-none');
    });
}

function addTemplateToList(templateId, templateName, templateTypeDisplay, isPublic) {
    const templateList = document.getElementById('template-list');
    if (!templateList) return;

    // Remove "no templates" message if present
    const noTemplatesMsg = document.getElementById('no-templates-message');
    if (noTemplatesMsg) {
        noTemplatesMsg.remove();
    }

    // Create the new template item (user always owns templates they just created)
    const globeIcon = isPublic ? '<i class="bi bi-globe text-primary me-1" title="Public template"></i>' : '<i class="bi bi-person-lock text-dark me-1" title="Private template"></i>';
    const templateHtml = `
        <div class="list-group-item list-group-item-action template-item d-flex justify-content-between align-items-center"
           data-template-id="${templateId}"
           data-template-name="${templateName}"
           data-template-public="${isPublic}">
            <div class="template-load-trigger flex-grow-1" style="cursor: pointer;">
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <h6 class="mb-0">
                        ${globeIcon}

    templateList.insertAdjacentHTML('afterbegin', templateHtml);

    // Re-initialize click handlers
    initTemplateClickHandlers();
}

    function updateActiveStatus() {
        const isActiveCheckbox = document.getElementById('is_active');
        const startDateInput = document.getElementById('start_date');
        const endDateInput = document.getElementById('end_date');
        const statusText = document.getElementById('active-status-text');
        const container = document.getElementById('active-status-container');
        const icon = document.getElementById('active-status-icon');

        const isActive = isActiveCheckbox.checked;
        const now = new Date();

        // Get start and end dates if they exist
        const startDate = startDateInput.value ? new Date(startDateInput.value) : null;
        const endDate = endDateInput.value ? new Date(endDateInput.value) : null;

        if (!isActive) {
            // Survey is inactive
            statusText.textContent = "{% trans 'Survey is not accepting responses' %}";
            container.style.backgroundColor = '#f8d7da';
            icon.className = 'bi bi-x-circle-fill text-danger';
        } else {
            // Survey is active, check dates
            if (startDate && now < startDate) {
                // Active but hasn't started yet
                statusText.textContent = "{% trans 'Survey is active but has not started yet' %}";
                container.style.backgroundColor = '#d1ecf1';
                icon.className = 'bi bi-info-circle-fill text-info';
            } else if (endDate && now > endDate) {
                // Active but has ended
                statusText.textContent = "{% trans 'Survey is active but has already ended' %}";
                container.style.backgroundColor = '#fff3cd';
                icon.className = 'bi bi-exclamation-triangle-fill text-warning';
            } else {
                // Active and within date range
                statusText.textContent = "{% trans 'Survey is accepting responses' %}";
                container.style.backgroundColor = '#d1e7dd';
                icon.className = 'bi bi-check-circle-fill text-success';
            }
        }
    }

    // Add event listeners to date inputs to update status when dates change
    document.addEventListener('DOMContentLoaded', function() {
        const startDateInput = document.getElementById('start_date');
        const endDateInput = document.getElementById('end_date');

        if (startDateInput) {
            startDateInput.addEventListener('change', updateActiveStatus);
        }
        if (endDateInput) {
            endDateInput.addEventListener('change', updateActiveStatus);
        }

        // Initial status check
        updateActiveStatus();
    });


    // Convert UTC to local time for display on page load
    function utcToLocal(utcString, inputId) {
        if (!utcString) return;
        const date = new Date(utcString + 'Z'); // 'Z' indicates UTC
        const localString = date.getFullYear() + '-' + 
            String(date.getMonth() + 1).padStart(2, '0') + '-' +
            String(date.getDate()).padStart(2, '0') + 'T' +
            String(date.getHours()).padStart(2, '0') + ':' +
            String(date.getMinutes()).padStart(2, '0');
        document.getElementById(inputId).value = localString;
    }

function updateAdvancedSettingsSummary() {
    const container = document.getElementById('advanced-settings-summary');
    if (!container) return;

    const badges = [];

    // Access Control
    const isPrivate = document.getElementById('is_private');
    if (isPrivate && isPrivate.checked) {
        badges.push({icon: 'bi-shield-lock', text: '{% trans "Private" %}', color: 'bg-primary'});

        const invitedCount = document.getElementById('invited-players-count');
        if (invitedCount && parseInt(invitedCount.textContent) > 0) {
            badges.push({icon: 'bi-people', text: invitedCount.textContent, color: 'bg-info text-dark'});
        }

        const guild = document.getElementById('guild');
        if (guild && guild.value) {
            badges.push({icon: 'bi-discord', text: guild.options[guild.selectedIndex].text, color: 'bg-info text-dark'});
        }
    } else {
        badges.push({icon: 'bi-globe', text: '{% trans "Public" %}', color: 'bg-success'});
    }

    // Association
    const series = document.getElementById('series');
    const seriesHidden = document.querySelector('input[type="hidden"][name="series"]');
    const stage = document.getElementById('stage');

    let seriesName = '';
    if (series && series.value) {
        seriesName = series.options[series.selectedIndex].text;
    } else if (!series && seriesHidden && seriesHidden.value) {
        seriesName = seriesHidden.closest('.col-md-6')?.querySelector('.form-control')?.textContent?.trim() || '';
    }

    let stageName = '';
    if (stage && stage.tagName === 'SELECT' && stage.value) {
        stageName = stage.options[stage.selectedIndex].text;
    }

    if (seriesName) {
        const text = stageName ? seriesName + ' - ' + stageName : seriesName;
        badges.push({icon: 'bi-trophy', text: text, color: 'bg-secondary'});
    }

    const isRegistration = document.getElementById('is_registration');
    if (isRegistration && isRegistration.checked) {
        badges.push({icon: 'bi-clipboard-check', text: '{% trans "Registration" %}', color: 'bg-warning text-dark'});
    }

    const post = document.getElementById('post');
    if (post && post.value) {
        badges.push({icon: 'bi-file-text', text: post.options[post.selectedIndex].text, color: 'bg-secondary'});
    }

    // Schedule
    const startDate = document.getElementById('start_date');
    const endDate = document.getElementById('end_date');
    const hasStart = startDate && startDate.value;
    const hasEnd = endDate && endDate.value;

    if (hasStart && hasEnd) {
        const s = new Date(startDate.value).toLocaleDateString();
        const e = new Date(endDate.value).toLocaleDateString();
        badges.push({icon: 'bi-calendar-week', text: s + ' - ' + e, color: 'bg-dark'});
    } else if (hasStart) {
        badges.push({icon: 'bi-calendar-event', text: '{% trans "Starts" %} ' + new Date(startDate.value).toLocaleDateString(), color: 'bg-dark'});
    } else if (hasEnd) {
        badges.push({icon: 'bi-calendar-x', text: '{% trans "Ends" %} ' + new Date(endDate.value).toLocaleDateString(), color: 'bg-dark'});
    }

    // Settings — dynamically count checked checkboxes in the settings section
    const settingsSection = document.getElementById('settings-section');
    if (settingsSection) {
        let checkedCount = settingsSection.querySelectorAll('.form-check-input:checked').length;

        // Also count response mode toggle if not in default (single) position
        const responseModeValue = document.getElementById('response_mode_value');
        if (responseModeValue && responseModeValue.value !== 'single') {
            checkedCount++;
        }

        if (checkedCount > 0) {
            if (checkedCount > 1) {
                badges.push({icon: 'bi-ui-checks-grid', text: checkedCount + ' {% trans "Options" %}', color: 'bg-primary'});
            }else{
                badges.push({icon: 'bi-ui-checks-grid', text: checkedCount + ' {% trans "Option" %}', color: 'bg-primary'});
            }
        }
    }

    // Render
    if (badges.length === 0) {
        container.innerHTML = '<span class="text-muted small">{% trans "Default settings" %}</span>';
    } else {
        container.innerHTML = badges.map(function(b) {
            return '<span class="badge ' + b.color + ' advanced-setting-badge"><i class="bi ' + b.icon + ' me-1"></i>' + b.text + '</span>';
        }).join('');
    }
}

// Update summary when advanced settings modal is closed (but not when swapping to invite modal)
const advancedModal = document.getElementById('advancedSettingsModal');
let _openingInviteFromAdvanced = false;

if (advancedModal) {
    advancedModal.addEventListener('hidden.bs.modal', function() {
        if (!_openingInviteFromAdvanced) {
            updateAdvancedSettingsSummary();
        }
    });
}

// Handle nested modals: hide advanced → show invite → on invite close, re-show advanced
function openInvitePlayersModal() {
    _openingInviteFromAdvanced = true;
    const advModal = bootstrap.Modal.getInstance(advancedModal);
    const invModalEl = document.getElementById('invitePlayersModal');
    const invModal = bootstrap.Modal.getOrCreateInstance(invModalEl);

    advancedModal.addEventListener('hidden.bs.modal', function onHidden() {
        advancedModal.removeEventListener('hidden.bs.modal', onHidden);
        invModal.show();
    }, {once: true});
    advModal.hide();
}

const inviteModalEl = document.getElementById('invitePlayersModal');
if (inviteModalEl && advancedModal) {
    inviteModalEl.addEventListener('hidden.bs.modal', function() {
        if (_openingInviteFromAdvanced) {
            _openingInviteFromAdvanced = false;
            const advModal = bootstrap.Modal.getOrCreateInstance(advancedModal);
            advModal.show();
        }
    });
}

// Handle nested modals: hide advanced → show add guild → on add guild close, re-show advanced
let _openingAddGuildFromAdvanced = false;

function openAddGuildModal() {

    const advModal = bootstrap.Modal.getInstance(advancedModal);
    const addGuildModalEl = document.getElementById('addGuildModal');
    const addGuildModal = bootstrap.Modal.getOrCreateInstance(addGuildModalEl);

    advancedModal.addEventListener('hidden.bs.modal', function onHidden() {
        advancedModal.removeEventListener('hidden.bs.modal', onHidden);
        addGuildModal.show();
    }, {once: true});
    advModal.hide();
}

const addGuildModalEl = document.getElementById('addGuildModal');
if (addGuildModalEl && advancedModal) {
    addGuildModalEl.addEventListener('hidden.bs.modal', function() {
        if (_openingAddGuildFromAdvanced) {
            _openingAddGuildFromAdvanced = false;
            const advModal = bootstrap.Modal.getOrCreateInstance(advancedModal);
            advModal.show();
        }
    });
}

// Initialize summary on page load
document.addEventListener('DOMContentLoaded', function() {
    updateAdvancedSettingsSummary();
});
