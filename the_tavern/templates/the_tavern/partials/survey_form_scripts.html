{% load i18n %}
{% include 'the_warroom/partials/toggle_scripts.html' %}
<script>
// ============================================
// Invited Players Management
// ============================================
let selectedInvitedPlayers = new Map(); // id -> {id, name, image_url}
let playerSearchTimeout = null;

function toggleTournamentAccessNote(selectID) {
    const isPrivateCheckbox = document.getElementById('is_private');
    const accessNote = document.getElementById(`${selectID}_access_note`);
    const select = document.getElementById(selectID);
    if (select && accessNote && isPrivateCheckbox){
        const shouldShow = isPrivateCheckbox.checked && select.value !== '';
        accessNote.style.display = shouldShow ? 'block' : 'none';
    }
}

function toggleAccessRestrictionsSection() {
    const isPrivateCheckbox = document.getElementById('is_private');
    const accessRestrictionsSection = document.getElementById('access-restrictions-section');

    if (isPrivateCheckbox && accessRestrictionsSection) {
        const hasRestrictions = accessRestrictionsSection.dataset.hasRestrictions === 'true';

        if (isPrivateCheckbox.checked && hasRestrictions) {
            // Making a public survey private (when it had prior restrictions)
            if (!confirm('{% trans "This survey will only be available to invited players or guild members. Other users will not be able to access it. Continue?" %}')) {
                isPrivateCheckbox.checked = false;
                return;
            }
        } else if (!isPrivateCheckbox.checked && hasRestrictions) {
            // Making a private survey public
            if (!confirm('{% trans "Making this survey public will remove all access restrictions (guild and invited players). All users will be able to view and take this survey. Continue?" %}')) {
                isPrivateCheckbox.checked = true;
                return;
            }
        }

        accessRestrictionsSection.style.display = isPrivateCheckbox.checked ? 'block' : 'none';

    }
}

// Initialize invited players from existing data on page load
function initializeInvitedPlayers() {
    const existingBadges = document.querySelectorAll('#invited-players-summary .invited-player-badge');
    existingBadges.forEach(badge => {
        const playerId = parseInt(badge.dataset.playerId);
        const playerName = badge.textContent.trim();
        selectedInvitedPlayers.set(playerId, { id: playerId, name: playerName });
    });
    updateModalSelectedPlayers();
}

// Search players with debounce
document.addEventListener('DOMContentLoaded', function() {
    initializeInvitedPlayers();

    // Title validation - clear invalid state on input
    const titleInput = document.getElementById('title');
    const titleError = document.getElementById('title-error');
    const titleIndicator = document.getElementById('title-required-indicator');
    if (titleInput && titleError) {
        titleInput.addEventListener('input', function() {
            if (this.value.trim()) {
                this.classList.remove('is-invalid');
                titleError.classList.add('d-none');
                if (titleIndicator) {
                    titleIndicator.classList.remove('text-danger');
                }
            }
        });
    }

    // Question text validation - clear invalid state on input (delegated for dynamic elements)
    document.addEventListener('input', function(e) {
        if (e.target.classList.contains('question-text')) {
            if (e.target.value.trim()) {
                e.target.classList.remove('is-invalid');
                const feedback = e.target.parentNode.querySelector('.invalid-feedback.validation-error');
                if (feedback) feedback.remove();
            }
        }
    });

    // Question type validation - clear invalid state on change (delegated for dynamic elements)
    document.addEventListener('change', function(e) {
        if (e.target.classList.contains('question-type')) {
            if (e.target.value) {
                e.target.classList.remove('is-invalid');
                const feedback = e.target.parentNode.querySelector('.invalid-feedback.validation-error');
                if (feedback) feedback.remove();
            }
        }
        // Likert scale validation - clear invalid state on change
        if (e.target.classList.contains('likert-scale-select')) {
            if (e.target.value) {
                e.target.classList.remove('is-invalid');
                const feedback = e.target.parentNode.querySelector('.invalid-feedback.validation-error');
                if (feedback) feedback.remove();
            }
        }
    });

    const searchInput = document.getElementById('player-search-input');
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            const query = this.value.trim();

            if (playerSearchTimeout) {
                clearTimeout(playerSearchTimeout);
            }

            if (query.length < 2) {
                document.getElementById('player-search-results').innerHTML =
                    '<p class="text-muted small">{% trans "Type at least 2 characters to search..." %}</p>';
                return;
            }

            playerSearchTimeout = setTimeout(() => searchPlayers(query), 300);
        });
    }

    // Sync modal state when modal opens
    const modal = document.getElementById('invitePlayersModal');
    if (modal) {
        modal.addEventListener('show.bs.modal', function() {
            updateModalSelectedPlayers();
        });
    }

    // Response mode toggle (replaces allow_multiple_responses / limit_responses checkboxes)
    initToggle({
        containerId: 'response-mode-toggle-container',
        inputId: 'response_mode_value',
        sliderId: 'response-mode-slider',
        descriptionId: 'response-mode-description-text',
        descriptions: {
            'multiple': '{% trans "Respondents can submit multiple responses to this survey." %}',
            'single': '{% trans "Each respondent can submit one response." %}',
            'limited': '{% trans "Set a maximum number of accepted responses." %}'
        },
        onChange: function(value) {
            const amrInput = document.getElementById('allow_multiple_responses_input');
            const lrInput = document.getElementById('limit_responses_input');
            const limitContainer = document.getElementById('limit_responses_container');

            // Reset both hidden inputs
            amrInput.value = '';
            lrInput.value = '';

            if (value === 'multiple') {
                amrInput.value = 'on';
            } else if (value === 'limited') {
                lrInput.value = 'on';
            }

            // Show/hide limit responses container
            if (limitContainer) {
                limitContainer.style.display = (value === 'limited') ? 'block' : 'none';
            }

            // Clear waitlist fields when not in limited mode
            if (value !== 'limited') {
                const hasWaitlist = document.getElementById('has_waitlist');
                if (hasWaitlist) hasWaitlist.checked = false;
            }
        }
    });

    // Initialize limit_responses_container visibility on page load
    const limitResponsesContainer = document.getElementById('limit_responses_container');
    if (limitResponsesContainer) {
        const lrInput = document.getElementById('limit_responses_input');
        limitResponsesContainer.style.display = (lrInput && lrInput.value === 'on') ? 'block' : 'none';
    }
});

function searchPlayers(query) {
    const resultsContainer = document.getElementById('player-search-results');
    resultsContainer.innerHTML = '<p class="text-muted small"><i class="bi bi-hourglass-split"></i> {% trans "Searching..." %}</p>';

    fetch(`{% url 'search-players-for-survey' %}?q=${encodeURIComponent(query)}`)
        .then(response => response.json())
        .then(data => {
            if (data.players.length === 0) {
                resultsContainer.innerHTML = '<p class="text-muted small">{% trans "No players found" %}</p>';
                return;
            }

            resultsContainer.innerHTML = data.players.map(player => {
                const isSelected = selectedInvitedPlayers.has(player.id);
                return `
                    <div class="d-flex align-items-center justify-content-between p-2 border-bottom player-result-item"
                         data-player-id="${player.id}">
                        <div class="d-flex align-items-center">
                            ${player.image_url ? `<img src="${player.image_url}" alt="" class="rounded-circle me-2" style="width: 32px; height: 32px; object-fit: cover;">` : '<i class="bi bi-person-circle me-2" style="font-size: 1.5rem;"></i>'}
                            <div>
                                <div>${player.name}</div>
                                ${player.discord ? `<small class="text-muted">${player.discord}</small>` : ''}
                            </div>
                        </div>
                        <button type="button" class="btn btn-sm ${isSelected ? 'btn-secondary' : 'btn-outline-primary'}"
                                onclick="togglePlayerSelection(${player.id}, '${player.name.replace(/'/g, "\\'")}', ${player.image_url ? `'${player.image_url}'` : 'null'})"
                                ${isSelected ? 'disabled' : ''}>
                            ${isSelected ? '{% trans "Added" %}' : '{% trans "Add" %}'}
                        </button>
                    </div>
                `;
            }).join('');
        })
        .catch(error => {
            console.error('Search error:', error);
            resultsContainer.innerHTML = '<p class="text-danger small">{% trans "Error searching players" %}</p>';
        });
}

function togglePlayerSelection(playerId, playerName, imageUrl) {
    if (selectedInvitedPlayers.has(playerId)) {
        selectedInvitedPlayers.delete(playerId);
    } else {
        selectedInvitedPlayers.set(playerId, { id: playerId, name: playerName, image_url: imageUrl });
    }

    updateModalSelectedPlayers();
    updateSearchResultButtons();
}

function updateModalSelectedPlayers() {
    const container = document.getElementById('modal-selected-players');
    const countSpan = document.getElementById('modal-selected-count');
    const noPlayersMsg = document.getElementById('no-players-message');

    if (!container) return;

    // Clear existing badges but keep the "no players" message element
    container.querySelectorAll('.badge').forEach(el => el.remove());

    if (selectedInvitedPlayers.size === 0) {
        if (noPlayersMsg) noPlayersMsg.style.display = 'block';
    } else {
        if (noPlayersMsg) noPlayersMsg.style.display = 'none';

        selectedInvitedPlayers.forEach((player, id) => {
            const badge = document.createElement('span');
            badge.className = 'badge bg-primary d-flex align-items-center gap-1';
            badge.innerHTML = `
                ${player.name}
                <button type="button" class="btn-close btn-close-white" style="font-size: 0.6rem;" onclick="togglePlayerSelection(${id}, '', null)"></button>
            `;
            container.appendChild(badge);
        });
    }

    if (countSpan) countSpan.textContent = selectedInvitedPlayers.size;
}

function updateSearchResultButtons() {
    document.querySelectorAll('.player-result-item').forEach(item => {
        const playerId = parseInt(item.dataset.playerId);
        const btn = item.querySelector('button');
        const isSelected = selectedInvitedPlayers.has(playerId);

        btn.classList.remove('btn-outline-primary', 'btn-secondary');
        btn.classList.add(isSelected ? 'btn-secondary' : 'btn-outline-primary');
        btn.textContent = isSelected ? '{% trans "Added" %}' : '{% trans "Add" %}';
        btn.disabled = isSelected;
    });
}

function saveInvitedPlayers() {
    // Update the hidden input
    const input = document.getElementById('invited-players-input');
    input.value = Array.from(selectedInvitedPlayers.keys()).join(',');

    // Update the summary display
    const summary = document.getElementById('invited-players-summary');
    const countSpan = document.getElementById('invited-players-count');

    summary.innerHTML = '';

    selectedInvitedPlayers.forEach((player, id) => {
        const badge = document.createElement('span');
        badge.className = 'badge bg-secondary invited-player-badge';
        badge.dataset.playerId = id;
        badge.innerHTML = `
            ${player.name}
            <button type="button" class="btn-close btn-close-white ms-1" style="font-size: 0.6rem;" onclick="removeInvitedPlayer(${id})"></button>
        `;
        summary.appendChild(badge);
    });

    countSpan.textContent = selectedInvitedPlayers.size;
}

function removeInvitedPlayer(playerId) {
    selectedInvitedPlayers.delete(playerId);

    // Update the summary display
    const badge = document.querySelector(`#invited-players-summary .invited-player-badge[data-player-id="${playerId}"]`);
    if (badge) badge.remove();

    // Update the hidden input
    const input = document.getElementById('invited-players-input');
    input.value = Array.from(selectedInvitedPlayers.keys()).join(',');

    // Update count
    const countSpan = document.getElementById('invited-players-count');
    countSpan.textContent = selectedInvitedPlayers.size;
}

// ============================================
// Section (Page Break) Management
// ============================================
let sectionCounter = 0;

function createSectionCardHtml(options) {
    const { sectionId, order, title = '', description = '', existingId = null } = options;

    let dataAttrs = `data-section-id="${sectionId}" data-order="${order}"`;
    if (existingId !== null) {
        dataAttrs += ` data-existing-id="${existingId}"`;
    }

    return `
        <div class="section-card" ${dataAttrs}>
            <div class="section-card-header">
                <span class="drag-handle me-2" style="cursor: move;"><i class="bi bi-grip-vertical"></i></span>
                <i class="bi bi-arrows-expand me-2 text-success"></i>
                <strong class="section-label text-success">{% trans 'Section Header' %}</strong>
                <div class="flex-fill"></div>
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeSectionCard('${sectionId}')">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
            <div class="section-card-body">
                <div class="row g-2">
                    <div class="col-md-6">
                        <input type="text" class="form-control form-control-sm section-title"
                               placeholder="Section ${order}" value="${title}">
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control form-control-sm section-description"
                               placeholder="{% trans 'Description (optional)' %}" value="${description}">
                    </div>
                </div>
            </div>
        </div>
    `;
}

function addPageBreak() {
    const container = document.getElementById('questions-container');

    // Remove "no questions" message if present
    const noQMsg = container.querySelector('p.text-muted');
    if (noQMsg) noQMsg.remove();

    const existingSectionCards = container.querySelectorAll('.section-card');

    if (existingSectionCards.length === 0) {
        // First page break: insert "Section 1" at top + "Section 2" at bottom
        sectionCounter++;
        const section1Id = `section-${sectionCounter}`;
        const section1Html = createSectionCardHtml({
            sectionId: section1Id,
            order: 1,
        });
        container.insertAdjacentHTML('afterbegin', section1Html);

        sectionCounter++;
        const section2Id = `section-${sectionCounter}`;
        const section2Html = createSectionCardHtml({
            sectionId: section2Id,
            order: 2,
        });
        container.insertAdjacentHTML('beforeend', section2Html);
    } else {
        // Add new section card at the bottom
        sectionCounter++;
        const newSectionId = `section-${sectionCounter}`;
        const newOrder = existingSectionCards.length + 1;
        const sectionHtml = createSectionCardHtml({
            sectionId: newSectionId,
            order: newOrder,
        });
        container.insertAdjacentHTML('beforeend', sectionHtml);
    }

    renumberSectionCards();
    initializeSortable();
}

function removeSectionCard(sectionId) {
    const container = document.getElementById('questions-container');
    const card = container.querySelector(`[data-section-id="${sectionId}"]`);
    if (!card) return;

    const remainingSectionCards = container.querySelectorAll('.section-card');

    if (remainingSectionCards.length <= 2) {
        // Removing second-to-last section also removes the last one
        if (confirm('{% trans "Remove all page breaks? The survey will return to a single page." %}')) {
            container.querySelectorAll('.section-card').forEach(c => c.remove());
        }
    } else {
        card.remove();
        renumberSectionCards();
    }
}

function renumberSectionCards() {
    const container = document.getElementById('questions-container');
    const sectionCards = container.querySelectorAll('.section-card');
    sectionCards.forEach((card, idx) => {
        card.dataset.order = idx + 1;
        // Update placeholder text on the title input
        const titleInput = card.querySelector('.section-title');
        if (titleInput && !titleInput.value) {
            titleInput.placeholder = `Section ${idx + 1}`;
        }
    });
}

/**
 * Creates HTML for a question card.
 * Single source of truth for question card HTML generation.
 */
function createQuestionHtml(options) {
    const {
        questionId,
        order,
        existingId = null,
        hasResponses = false,
        responseCount = 0,
        text = '',
        type = '',
        required = true,
        helpText = ''
    } = options;

    // Build response warning badge (only if has responses)
    const responseBadge = hasResponses ? `
        <span class="badge bg-warning text-dark ms-2" title="${responseCount} response(s) recorded">
            <i class="bi bi-exclamation-triangle-fill"></i> ${responseCount} response(s)
        </span>
    ` : '';

    // Save as template button (always shown)
    const saveTemplateButton = `
        <button type="button" class="btn btn-sm btn-outline-primary me-1"
                onclick="openSaveTemplateModal('${questionId}')"
                title="Save as template">
            <i class="bi bi-floppy"></i>
        </button>
    `;

    // Build delete/hide buttons based on response state
    let actionButtons;
    if (hasResponses) {
        actionButtons = `
            <button type="button" class="btn btn-sm btn-warning me-1" onclick="confirmHideQuestion('${questionId}')"
                    title="Hide question (preserves response data)">
                <i class="bi bi-eye-slash"></i>
            </button>
            <button type="button" class="btn btn-sm btn-danger" onclick="confirmDeleteQuestionWithResponses('${questionId}')"
                    title="Delete question and all its responses">
                <i class="bi bi-trash"></i>
            </button>
        `;
    } else {
        actionButtons = `
            <button type="button" class="btn btn-sm btn-danger" onclick="removeQuestion('${questionId}')">
                <i class="bi bi-trash"></i>
            </button>
        `;
    }

    // Build data attributes
    let dataAttrs = `data-question-id="${questionId}" data-order="${order}"`;
    if (existingId !== null) {
        dataAttrs += ` data-existing-id="${existingId}" data-has-responses="${hasResponses}" data-response-count="${responseCount}"`;
    }

    // Type locked message (only if has responses)
    const typeLockedMessage = hasResponses
        ? '<small class="text-muted"><i class="bi bi-lock"></i> Type locked - question has responses</small>'
        : '';

    // Build type options
    const typeOptions = Object.entries(questionTypes).map(([key, value]) =>
        `<option value="${key}" ${type === key ? 'selected' : ''}>${value}</option>`
    ).join('');

    return `
        <div class="card question-card ${hasResponses ? 'border-warning' : ''}" ${dataAttrs}>
            <div class="question-header ${hasResponses ? 'bg-warning-subtle' : ''}">
                <span class="drag-handle me-2">
                    <i class="bi bi-grip-vertical"></i>
                </span>
                <span class="flex-fill"><strong>Question ${order}</strong>${responseBadge}</span>
                ${saveTemplateButton}
                ${actionButtons}
            </div>
            <div class="card-body">


                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Question Type <span class="text-danger">*</span></label>
                        <select class="form-select question-type" onchange="handleTypeChange('${questionId}')" ${hasResponses ? 'disabled' : ''}>
                            <option value="">Select type...</option>
                            ${typeOptions}
                        </select>
                        ${typeLockedMessage}
                    </div>
                    <div class="col-md-6">
                        <div class="form-check mt-4">
                            <input class="form-check-input question-required" type="checkbox" ${required ? 'checked' : ''}>
                            <label class="form-check-label">Required</label>
                        </div>
                    </div>
                </div>

                <div class="type-specific-options"></div>

                <div class="mb-3">
                    <label class="form-label">Question Text <span class="text-danger">*</span></label>
                    <textarea class="form-control question-text" rows="2" required>${text}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Help Text (optional)</label>
                    <input type="text" class="form-control question-help" placeholder="Additional guidance for respondents" value="${helpText}">
                </div>
            </div>
        </div>
    `;
}

// Series/Stage dynamic loading
function loadSeriesStages(preselectedStageId = null) {
    const seriesSelect = document.getElementById('series');
    const stageSelect = document.getElementById('stage');

    if (!seriesSelect || !stageSelect) return;

    const tournamentId = seriesSelect.value;

    // Reset stage dropdown
    stageSelect.innerHTML = '<option value="">{% trans "All stages / No specific stage" %}</option>';

    if (!tournamentId) {
        stageSelect.disabled = true;
        toggleTournamentAccessNote('stage');
        return;
    }

    // Enable and show loading state
    stageSelect.disabled = false;

    fetch(`{% url 'get-tournament-stages' %}?tournament_id=${tournamentId}`)
        .then(response => response.json())
        .then(data => {
            if (data.stages && data.stages.length > 0) {
                data.stages.forEach(stage => {
                    const option = document.createElement('option');
                    option.value = stage.id;
                    option.textContent = stage.name;
                    // Pre-select the stage if it matches
                    if (preselectedStageId && stage.id == preselectedStageId) {
                        option.selected = true;
                    }
                    stageSelect.appendChild(option);
                });
            }
            // If no stages, dropdown stays at default option

            // Update tournament access note after stages are loaded
            toggleTournamentAccessNote('stage');
        })
        .catch(error => {
            console.error('Error loading stages:', error);
            // Keep dropdown disabled on error
            stageSelect.disabled = true;
        });
}

function toggleRegistrationSurveyOption() {
    const seriesSelect = document.getElementById('series');
    const seriesHidden = document.querySelector('input[type="hidden"][name="series"]');
    const registrationContainer = document.getElementById('registration-survey-container');

    if (!registrationContainer) return;

    const hasSeriesSelected = (seriesSelect && seriesSelect.value) || (seriesHidden && seriesHidden.value);
    registrationContainer.style.display = hasSeriesSelected ? 'block' : 'none';

    // Uncheck is_registration if no series selected
    if (!hasSeriesSelected) {
        const isRegistration = document.getElementById('is_registration');
        if (isRegistration) isRegistration.checked = false;
    }
}

// Initialize series dropdown on page load
document.addEventListener('DOMContentLoaded', function() {
    const seriesSelect = document.getElementById('series');
    if (seriesSelect && seriesSelect.value && !seriesSelect.disabled) {
        // Get preselected stage ID from data attribute if in edit mode
        const preselectedStageId = seriesSelect.dataset.preselectedStage || null;
        loadSeriesStages(preselectedStageId);
    }

    // Add event listeners for toggleTournamentAccessNote
    const seriesSelectEl = document.getElementById('series');
    const stageSelectEl = document.getElementById('stage');
    const isPrivateCheckbox = document.getElementById('is_private');

    if (seriesSelectEl) {
        seriesSelectEl.addEventListener('change', function() {
            toggleTournamentAccessNote('series');
            toggleRegistrationSurveyOption();
        });
    }

    if (stageSelectEl) {
        stageSelectEl.addEventListener('change', function() {
            toggleTournamentAccessNote('stage');
        });
    }

    if (isPrivateCheckbox) {
        isPrivateCheckbox.addEventListener('change', function() {
            toggleTournamentAccessNote('series');
            toggleTournamentAccessNote('stage');
        });
    }

    // Call on page load to set initial state for series
    // (stage will be called after loadSeriesStages completes)
    toggleTournamentAccessNote('series');
    toggleRegistrationSurveyOption();

    // Resolve locked stage name (when pre-filled and locked from settings hub)
    const prefillStageEl = document.getElementById('prefill-stage-name');
    if (prefillStageEl) {
        const stageId = prefillStageEl.dataset.stageId;
        const seriesInput = document.querySelector('input[name="series"]');
        if (stageId && seriesInput) {
            fetch(`{% url 'get-tournament-stages' %}?tournament_id=${seriesInput.value}`)
                .then(r => r.json())
                .then(data => {
                    const match = (data.stages || []).find(s => String(s.id) === String(stageId));
                    prefillStageEl.textContent = match ? match.name : stageId;
                })
                .catch(() => { prefillStageEl.textContent = stageId; });
        }
    }
});

function initializeSortable() {
    const container = document.getElementById('questions-container');

    // Check if Sortable is available
    if (typeof Sortable === 'undefined') {
        console.error('Sortable library not loaded');
        return;
    }

    // Destroy existing instance if it exists
    if (sortableInstance) {
        sortableInstance.destroy();
    }

    // Only initialize if there are questions or section cards
    const draggableItems = container.querySelectorAll('.question-card, .section-card');
    if (draggableItems.length > 0) {
        sortableInstance = new Sortable(container, {
            animation: 150,
            handle: '.drag-handle',
            ghostClass: 'sortable-ghost',
            draggable: '.question-card, .section-card',
            onEnd: function(evt) {
                renumberQuestions();
                renumberSectionCards();
            }
        });
    }
}

{% if existing_questions %}
function loadExistingQuestions() {
    const container = document.getElementById('questions-container');
    container.innerHTML = '';

    // Build a map of section_id -> section data for interleaving
    const sectionMap = {};
    if (existingSections && existingSections.length > 0) {
        existingSections.forEach(s => {
            sectionMap[s.id] = s;
        });
    }

    // Group questions by section_id to determine where to insert section cards
    // Track which sections we've already inserted
    const insertedSections = new Set();
    let lastSectionId = '__none__'; // sentinel

    existingQuestions.forEach((question, index) => {
        const qSectionId = question.section_id || null;

        // If the section changed, insert the section card
        if (qSectionId !== null && !insertedSections.has(qSectionId) && sectionMap[qSectionId]) {
            const sData = sectionMap[qSectionId];
            sectionCounter++;
            const sectionCardId = `section-${sData.id}`;
            const sectionHtml = createSectionCardHtml({
                sectionId: sectionCardId,
                order: sData.order,
                title: sData.title,
                description: sData.description,
                existingId: sData.id,
            });
            container.insertAdjacentHTML('beforeend', sectionHtml);
            insertedSections.add(qSectionId);
        }

        questionCounter++;
        const questionId = `question-${questionCounter}`;

        const questionHtml = createQuestionHtml({
            questionId,
            order: index + 1,
            existingId: question.id,
            hasResponses: question.has_responses || false,
            responseCount: question.response_count || 0,
            text: question.text,
            type: question.type,
            required: question.required,
            helpText: question.help_text || ''
        });

        container.insertAdjacentHTML('beforeend', questionHtml);

        // Load type-specific options
        if (question.type) {
            handleTypeChange(questionId, question);
        }
    });

    // Insert any sections that had no questions (shouldn't happen normally, but just in case)
    if (existingSections) {
        existingSections.forEach(s => {
            if (!insertedSections.has(s.id)) {
                sectionCounter++;
                const sectionCardId = `section-${s.id}`;
                const sectionHtml = createSectionCardHtml({
                    sectionId: sectionCardId,
                    order: s.order,
                    title: s.title,
                    description: s.description,
                    existingId: s.id,
                });
                container.insertAdjacentHTML('beforeend', sectionHtml);
            }
        });
    }

    renumberSectionCards();
    initializeSortable();
}
{% endif %}

function loadQuestionFromTemplate(templateData) {
    questionCounter++;
    const questionId = `question-${questionCounter}`;
    const container = document.getElementById('questions-container');

    // Remove "no questions" message if present
    if (container.querySelector('p.text-muted')) {
        container.innerHTML = '';
    }

    const questionHtml = createQuestionHtml({
        questionId,
        order: questionCounter,
        text: templateData.text || '',
        type: templateData.type || '',
        required: templateData.required || false,
        helpText: templateData.help_text || ''
    });

    container.insertAdjacentHTML('beforeend', questionHtml);

    // Load type-specific options if type is set
    // Use handleTypeChange which handles all question types including TA and post-component
    if (templateData.type) {
        handleTypeChange(questionId, templateData);
    }

    initializeSortable();
}

function addQuestion() {
    questionCounter++;
    const questionId = `question-${questionCounter}`;

    const container = document.getElementById('questions-container');

    // Remove "no questions" message if present
    if (container.querySelector('p.text-muted')) {
        container.innerHTML = '';
    }

    const questionHtml = createQuestionHtml({
        questionId,
        order: questionCounter,
        required: true  // New questions default to required
    });

    container.insertAdjacentHTML('beforeend', questionHtml);
    initializeSortable();
}

function removeQuestion(questionId) {
    const question = document.querySelector(`[data-question-id="${questionId}"]`);
    if (question && confirm('Are you sure you want to remove this question?')) {
        question.remove();
        renumberQuestions();
    }
}

function confirmHideQuestion(questionId) {
    const question = document.querySelector(`[data-question-id="${questionId}"]`);
    const responseCount = question.dataset.responseCount || 'some';

    if (confirm(`This question has ${responseCount} recorded response(s).\n\nRemoving it will HIDE the question (not delete it) to preserve data integrity.\n\nHidden questions won't appear in the survey but their answers are kept for reporting.\n\nContinue?`)) {
        // Get question data before removing
        const existingId = question.dataset.existingId;
        const questionText = question.querySelector('.question-text').value;
        const questionType = question.querySelector('.question-type').value;

        if (existingId) {
            // Add to hidden questions dropdown
            const typeDisplay = questionTypes[questionType] || questionType;
            addQuestionToHiddenDropdown({
                id: parseInt(existingId),
                text: questionText,
                type: questionType,
                type_display: typeDisplay,
                response_count: parseInt(responseCount) || 0
            });

            // Also add to hiddenQuestions array so it can be restored
            if (typeof hiddenQuestions !== 'undefined') {
                hiddenQuestions.push({
                    id: parseInt(existingId),
                    text: questionText,
                    type: questionType,
                    type_display: typeDisplay,
                    response_count: parseInt(responseCount) || 0
                });
            }
        }

        question.remove();
        renumberQuestions();
    }
}

function confirmDeleteQuestionWithResponses(questionId) {
    const question = document.querySelector(`[data-question-id="${questionId}"]`);
    const responseCount = question.dataset.responseCount || 'some';

    if (confirm(`⚠️ WARNING: This question has ${responseCount} recorded response(s).\n\nDeleting it will PERMANENTLY DELETE the question AND all associated answers.\n\nThis action cannot be undone once the survey is saved.\n\nAre you sure you want to delete this question and its responses?`)) {
        // Mark for deletion by removing the existing-id (so backend creates new instead of updating)
        // But we need to track it for actual deletion - add a data attribute
        const existingId = question.dataset.existingId;
        if (existingId) {
            // Add to a hidden field to track questions to delete
            let deleteField = document.getElementById('questions-to-delete');
            if (!deleteField) {
                deleteField = document.createElement('input');
                deleteField.type = 'hidden';
                deleteField.id = 'questions-to-delete';
                deleteField.name = 'questions_to_delete';
                deleteField.value = '';
                document.getElementById('survey-form').appendChild(deleteField);
            }
            const currentIds = deleteField.value ? deleteField.value.split(',') : [];
            currentIds.push(existingId);
            deleteField.value = currentIds.join(',');
        }

        question.remove();
        renumberQuestions();
    }
}

function renumberQuestions() {
    const questions = document.querySelectorAll('.question-card');
    questions.forEach((q, idx) => {
        q.dataset.order = idx + 1;
        q.querySelector('.question-header strong').textContent = `Question ${idx + 1}`;
    });
}

function handleTypeChange(questionId, existingData = null) {

function addChoice(questionId, defaultValue = '', existingId = null, readonly = false, choiceData = null) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const choicesList = card.querySelector('.choices-list');
    const choiceId = existingId ? `choice-${existingId}` : `choice-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;

    // Check if choice has responses
    const hasResponses = choiceData?.has_responses || false;

    // Determine the delete/hide button
    let actionButton = '';
    if (!readonly) {
        if (hasResponses) {
            actionButton = `<button type="button" class="btn btn-sm btn-outline-warning" onclick="confirmHideChoice('${questionId}', '${choiceId}')" title="This choice has responses - will be hidden, not deleted"><i class="bi bi-eye-slash"></i></button>`;
        } else {
            actionButton = `<button type="button" class="btn btn-sm btn-outline-danger" onclick="removeChoice('${questionId}', '${choiceId}')"><i class="bi bi-x"></i></button>`;
        }
    }

    const lockIcon = hasResponses ? '<i class="bi bi-lock-fill text-muted" title="This choice has responses and cannot be edited"></i>' : '';
    const isReadonly = readonly || hasResponses;

    const choiceHtml = `
        <div class="choice-item ${hasResponses ? 'border-start border-warning border-3 ps-2' : ''}" data-choice-id="${choiceId}" ${existingId ? 'data-existing-choice-id="' + existingId + '"' : ''} data-has-responses="${hasResponses}">
            <input type="text" class="form-control ${hasResponses ? 'bg-warning-subtle' : ''}" placeholder="Choice text" value="${defaultValue}" ${isReadonly ? 'readonly' : ''} required>
            ${lockIcon}
            ${actionButton}
        </div>
    `;

    choicesList.insertAdjacentHTML('beforeend', choiceHtml);
}

function removeChoice(questionId, choiceId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const choice = card.querySelector(`[data-choice-id="${choiceId}"]`);

    // Remove the choice - form validation will check for minimum on submit
    choice.remove();
}

function confirmHideChoice(questionId, choiceId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const choice = card.querySelector(`[data-choice-id="${choiceId}"]`);

    if (confirm(`This choice has been selected in survey responses.\n\nRemoving it will HIDE the choice to preserve data integrity.\n\nHidden choices won't appear as options but existing answers are preserved.\n\nContinue?`)) {
        // Move choice to hidden dropdown instead of just removing
        const choiceText = choice.querySelector('input').value;
        const existingChoiceId = choice.dataset.existingChoiceId;

        if (existingChoiceId) {
            // Add to hidden choices dropdown
            addToHiddenDropdown(questionId, {
                id: parseInt(existingChoiceId),
                text: choiceText,
                has_responses: true
            });
        }

        choice.remove();
    }
}

// Hidden choices management
function loadHiddenChoices(questionId, hiddenChoices) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const dropdown = card.querySelector('.hidden-choices-dropdown');
    const menu = card.querySelector('.hidden-choices-menu');
    const countSpan = card.querySelector('.hidden-count');

    if (!dropdown || !menu) return;

    menu.innerHTML = '';

    hiddenChoices.forEach(choice => {
        const displayText = choice.post_title || choice.text;
        const li = document.createElement('li');
        li.dataset.choiceId = choice.id;
        li.innerHTML = `
            <a class="dropdown-item d-flex justify-content-between align-items-center" href="#"
               onclick="restoreHiddenChoice('${questionId}', ${choice.id}, '${displayText.replace(/'/g, "\\'")}', ${choice.has_responses}); return false;">
                <span class="text-truncate me-2" style="max-width: 200px;">${displayText}</span>
                <i class="bi bi-arrow-counterclockwise text-success"></i>
            </a>
        `;
        menu.appendChild(li);
    });

    countSpan.textContent = hiddenChoices.length;
    dropdown.style.display = hiddenChoices.length > 0 ? 'block' : 'none';
}

function addToHiddenDropdown(questionId, choiceData) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const dropdown = card.querySelector('.hidden-choices-dropdown');
    const menu = card.querySelector('.hidden-choices-menu');
    const countSpan = card.querySelector('.hidden-count');

    if (!dropdown || !menu) return;

    const displayText = choiceData.post_title || choiceData.text;
    const li = document.createElement('li');
    li.dataset.choiceId = choiceData.id;
    li.innerHTML = `
        <a class="dropdown-item d-flex justify-content-between align-items-center" href="#"
           onclick="restoreHiddenChoice('${questionId}', ${choiceData.id}, '${displayText.replace(/'/g, "\\'")}', ${choiceData.has_responses}); return false;">
            <span class="text-truncate me-2" style="max-width: 200px;">${displayText}</span>
            <i class="bi bi-arrow-counterclockwise text-success"></i>
        </a>
    `;
    menu.appendChild(li);

    const currentCount = parseInt(countSpan.textContent) || 0;
    countSpan.textContent = currentCount + 1;
    dropdown.style.display = 'block';
}

function restoreHiddenChoice(questionId, choiceId, choiceText, hasResponses) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const menu = card.querySelector('.hidden-choices-menu');
    const countSpan = card.querySelector('.hidden-count');
    const dropdown = card.querySelector('.hidden-choices-dropdown');

    // Add the choice back to the choices list
    addChoice(questionId, choiceText, choiceId, false, {
        id: choiceId,
        text: choiceText,
        has_responses: hasResponses
    });

    // Remove from hidden dropdown
    const menuItem = menu.querySelector(`li[data-choice-id="${choiceId}"]`);
    if (menuItem) {
        menuItem.remove();
    } else {
        // If no data-choice-id, find by matching onclick
        const items = menu.querySelectorAll('li');
        items.forEach(item => {
            const link = item.querySelector('a');
            if (link && link.getAttribute('onclick').includes(`${choiceId},`)) {
                item.remove();
            }
        });
    }

    // Update count
    const currentCount = parseInt(countSpan.textContent) || 0;
    const newCount = Math.max(0, currentCount - 1);
    countSpan.textContent = newCount;

    if (newCount === 0) {
        dropdown.style.display = 'none';
    }
}

function restoreHiddenQuestion(questionId) {
    const dropdown = document.querySelector('.hidden-questions-dropdown');
    const menu = document.querySelector('.hidden-questions-menu');
    const countSpan = document.querySelector('.hidden-questions-count');

    // Show loading state on the menu item
    const menuItem = menu.querySelector(`li[data-question-id="${questionId}"]`);
    if (menuItem) {
        const link = menuItem.querySelector('a');
        const originalHtml = link.innerHTML;
        link.innerHTML = '<i class="bi bi-hourglass-split"></i> Loading...';
        link.style.pointerEvents = 'none';
    }

    // Fetch full question data via AJAX
    fetch(`{% url 'get-question-data' question_id=0 %}`.replace('/0/', `/${questionId}/`))
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch question data');
            }
            return response.json();
        })
        .then(questionData => {
            // Now we have full question data including choices
            questionCounter++;
            const newQuestionId = `question-${questionCounter}`;
            const container = document.getElementById('questions-container');

            // Remove "no questions" message if present
            if (container.querySelector('p.text-muted')) {
                container.innerHTML = '';
            }

            const questionHtml = createQuestionHtml({
                questionId: newQuestionId,
                order: questionCounter,
                existingId: questionData.id,
                hasResponses: questionData.has_responses,
                responseCount: questionData.response_count,
                text: questionData.text,
                type: questionData.type,
                required: questionData.required,
                helpText: questionData.help_text || ''
            });

            container.insertAdjacentHTML('beforeend', questionHtml);

            // Load type-specific options with full data (including choices)
            handleTypeChange(newQuestionId, questionData);

            initializeSortable();
            renumberQuestions();

            // Remove from hidden dropdown
            if (menuItem) {
                menuItem.remove();
            }

            // Remove from hiddenQuestions array
            const index = hiddenQuestions.findIndex(q => q.id === questionId);
            if (index > -1) {
                hiddenQuestions.splice(index, 1);
            }

            // Update count
            const currentCount = parseInt(countSpan.textContent) || 0;
            const newCount = Math.max(0, currentCount - 1);
            countSpan.textContent = newCount;

            if (newCount === 0) {
                dropdown.style.display = 'none';
            }
        })
        .catch(error => {
            console.error('Error restoring question:', error);
            alert('Failed to restore question. Please try again.');

            // Restore the menu item to its original state
            if (menuItem) {
                const link = menuItem.querySelector('a');
                const questionBasicData = hiddenQuestions.find(q => q.id === questionId);
                if (questionBasicData) {
                    link.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center w-100">
                            <span class="text-truncate me-2" style="max-width: 250px;">${questionBasicData.text}</span>
                            <i class="bi bi-arrow-counterclockwise text-success"></i>
                        </div>
                        <small class="text-muted">${questionBasicData.type_display} · ${questionBasicData.response_count} response(s)</small>
                    `;
                }
                link.style.pointerEvents = '';
            }
        });
}

function updateLikertPreview(questionId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const scaleSelect = card.querySelector('.likert-scale-select');
    const previewContainer = card.querySelector('.likert-preview-container');

    if (!scaleSelect || !previewContainer) return;

    const scaleId = parseInt(scaleSelect.value);

    if (!scaleId) {
        previewContainer.innerHTML = '';
        return;
    }

    const scale = likertScales.find(s => s.id === scaleId);

    if (!scale) {
        previewContainer.innerHTML = '';
        return;
    }

    // Create range of values
    const values = [];
    for (let i = scale.min_value; i <= scale.max_value; i++) {
        values.push(i);
    }

    // Build preview HTML similar to survey_preview.html
    let previewHTML = `
        <div class="card bg-light my-2">
            <div class="card-body">
                <div class="d-flex justify-content-between mb-2">
                    <small class="text-muted">${scale.min_label}</small>
                    <small class="text-muted">${scale.max_label}</small>
                </div>
                <div class="btn-group d-flex flex-column flex-md-row gap-2" role="group">
    `;

    values.forEach(value => {
        const label = scale.labels && scale.labels[value] ? scale.labels[value] : '';
        previewHTML += `
            <div class="d-flex flex-column align-items-center flex-fill">
                <button type="button" class="btn btn-outline-primary w-100" disabled>
                    ${value}
                </button>
                ${label ? `<small class="text-muted mt-1 text-center">${label}</small>` : ''}
            </div>
        `;
    });

    previewHTML += `
                </div>
            </div>
        </div>
    `;

    previewContainer.innerHTML = previewHTML;
}

function saveCustomScale(questionId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const errorEl = card.querySelector('.custom-scale-error');
    errorEl.classList.add('d-none');

    const name = card.querySelector('.custom-scale-name').value.trim();
    const minValue = parseInt(card.querySelector('.custom-scale-min-value').value);
    const maxValue = parseInt(card.querySelector('.custom-scale-max-value').value);
    const minLabel = card.querySelector('.custom-scale-min-label').value.trim();
    const maxLabel = card.querySelector('.custom-scale-max-label').value.trim();

    if (!name || !minLabel || !maxLabel) {
        errorEl.textContent = 'All fields are required.';
        errorEl.classList.remove('d-none');
        return;
    }
    if (isNaN(minValue) || isNaN(maxValue) || minValue >= maxValue) {
        errorEl.textContent = 'Max value must be greater than min value.';
        errorEl.classList.remove('d-none');
        return;
    }
    if (minValue < 0 || maxValue > 10) {
        errorEl.textContent = 'Values must be between 0 and 10.';
        errorEl.classList.remove('d-none');
        return;
    }
    if ((maxValue - minValue + 1) > 12) {
        errorEl.textContent = 'Scale cannot exceed 12 points.';
        errorEl.classList.remove('d-none');
        return;
    }

    fetch('{% url "create-custom-scale" %}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({ name, min_value: minValue, max_value: maxValue, min_label: minLabel, max_label: maxLabel })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const scale = data.scale;
            // Add to global likertScales array
            likertScales.push(scale);

            // Add option to ALL scale selects on the page and select it on this one
            document.querySelectorAll('.likert-scale-select').forEach(select => {
                const option = document.createElement('option');
                option.value = scale.id;
                option.textContent = scale.name;
                select.appendChild(option);
            });

            // Select the new scale on this question's dropdown
            const scaleSelect = card.querySelector('.likert-scale-select');
            scaleSelect.value = scale.id;

            // Hide the form and update preview
            card.querySelector('.custom-scale-form').classList.add('d-none');
            updateLikertPreview(questionId);
        } else {
            errorEl.textContent = data.error || 'Failed to create scale.';
            errorEl.classList.remove('d-none');
        }
    })
    .catch(error => {
        console.error('Error creating scale:', error);
        errorEl.textContent = 'An error occurred. Please try again.';
        errorEl.classList.remove('d-none');
    });
}

// Post selection functions
function togglePostChoices(questionId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const usePostsCheckbox = card.querySelector('.use-post-choices');
    const postConfig = card.querySelector('.post-choices-config');
    const manualChoices = card.querySelector('.manual-choices-section');

    if (usePostsCheckbox.checked) {
        postConfig.style.display = 'block';
        manualChoices.style.display = 'none';
        // Disable required validation on manual choice inputs
        const manualInputs = manualChoices.querySelectorAll('input[required]');
        manualInputs.forEach(input => {
            input.removeAttribute('required');
            input.dataset.wasRequired = 'true';
        });
    } else {
        postConfig.style.display = 'none';
        manualChoices.style.display = 'block';
        // Re-enable required validation on manual choice inputs
        const manualInputs = manualChoices.querySelectorAll('input[data-was-required="true"]');
        manualInputs.forEach(input => {
            input.setAttribute('required', '');
            input.removeAttribute('data-was-required');
        });
    }
}

let searchTimeout = null;
function searchPosts(questionId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const searchInput = card.querySelector('.post-search-input');
    const componentSelect = card.querySelector('.post-component-select');
    const resultsContainer = card.querySelector('.post-search-results');

    const query = searchInput.value.trim();
    const component = componentSelect.value;

    // Clear previous timeout
    if (searchTimeout) {
        clearTimeout(searchTimeout);
    }

    // Debounce search
    searchTimeout = setTimeout(() => {
        if (!component) {
            resultsContainer.innerHTML = '<div class="text-muted">Please select a component type first.</div>';
            return;
        }

        fetch(`{% url 'search-posts-for-survey' %}?q=${encodeURIComponent(query)}&component=${component}`)
            .then(response => response.json())
            .then(data => {
                if (data.posts.length === 0) {
                    resultsContainer.innerHTML = '<div class="text-muted">No results found.</div>';
                    return;
                }

                const selectedIds = getSelectedPostIds(questionId);

                resultsContainer.innerHTML = data.posts.map(post => {
                    const isSelected = selectedIds.includes(post.id);
                    return `
                        <div class="d-flex align-items-center justify-content-between p-2 border-bottom post-result-item"
                             data-post-id="${post.id}">
                            <div class="d-flex align-items-center">
                                ${post.icon_url ? `<img src="${post.icon_url}" alt="" class="mx-2 md-faction-icon">` : ''}
                                <span>${post.title}</span>
                                ${post.official ? '<span class="badge bg-success ms-2">Official</span>' : '<span class="badge bg-secondary ms-2">Fan</span>'}
                            </div>
                            <button type="button" class="btn btn-sm ${isSelected ? 'btn-secondary' : 'btn-outline-primary'}"
                                    onclick="addSelectedPost('${questionId}', {id: ${post.id}, title: '${post.title.replace(/'/g, "\\'")}', icon_url: ${post.icon_url ? `'${post.icon_url}'` : 'null'}})"
                                    ${isSelected ? 'disabled' : ''}>
                                ${isSelected ? 'Added' : 'Add'}
                            </button>
                        </div>
                    `;
                }).join('');
            })
            .catch(error => {
                console.error('Search error:', error);
                resultsContainer.innerHTML = '<div class="text-danger">Error searching posts.</div>';
            });
    }, 300);
}

function getSelectedPostIds(questionId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const selectedContainer = card.querySelector('.selected-posts-container');
    const items = selectedContainer.querySelectorAll('.selected-post-item');
    return Array.from(items).map(item => parseInt(item.dataset.postId));
}

function addSelectedPost(questionId, postData) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const selectedContainer = card.querySelector('.selected-posts-container');
    const countSpan = card.querySelector('.selected-count');
    const resultsContainer = card.querySelector('.post-search-results');

    // Check if already selected
    if (selectedContainer.querySelector(`[data-post-id="${postData.id}"]`)) {
        return;
    }

    // Check limit
    const currentCount = selectedContainer.querySelectorAll('.selected-post-item').length;
    if (currentCount >= 20) {
        alert('Maximum 20 posts allowed.');
        return;
    }

    const postHtml = `
        <div class="d-flex align-items-center justify-content-between p-2 border rounded mb-1 selected-post-item"
             data-post-id="${postData.id}">
            <div class="d-flex align-items-center">
                ${postData.icon_url ? `<img src="${postData.icon_url}" alt="" class="mx-2 md-faction-icon">` : ''}
                <span>${postData.title}</span>
            </div>
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeSelectedPost('${questionId}', ${postData.id})">
                <i class="bi bi-x"></i>
            </button>
        </div>
    `;

    selectedContainer.insertAdjacentHTML('beforeend', postHtml);
    countSpan.textContent = currentCount + 1;

    // Clear validation error if at least 2 posts are selected
    if (currentCount + 1 >= 2) {
        const selectedPostsList = card.querySelector('.selected-posts-list');
        const errorDiv = selectedPostsList.querySelector('.validation-error');
        if (errorDiv) {
            errorDiv.remove();
        }
    }

    // Update add button in search results
    const resultItem = resultsContainer.querySelector(`[data-post-id="${postData.id}"]`);
    if (resultItem) {
        const btn = resultItem.querySelector('button');
        btn.classList.remove('btn-outline-primary');
        btn.classList.add('btn-secondary');
        btn.textContent = 'Added';
        btn.disabled = true;
    }
}

function removeSelectedPost(questionId, postId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const selectedContainer = card.querySelector('.selected-posts-container');
    const countSpan = card.querySelector('.selected-count');
    const resultsContainer = card.querySelector('.post-search-results');

    const item = selectedContainer.querySelector(`[data-post-id="${postId}"]`);
    if (item) {
        item.remove();
        countSpan.textContent = selectedContainer.querySelectorAll('.selected-post-item').length;

        // Update add button in search results
        const resultItem = resultsContainer.querySelector(`[data-post-id="${postId}"]`);
        if (resultItem) {
            const btn = resultItem.querySelector('button');
            btn.classList.remove('btn-secondary');
            btn.classList.add('btn-outline-primary');
            btn.textContent = 'Add';
            btn.disabled = false;
        }
    }
}

// Serialize form data on submit
document.getElementById('survey-form').addEventListener('submit', function(e) {

    // Validate title field first
    const titleInput = document.getElementById('title');
    const titleError = document.getElementById('title-error');
    const titleIndicator = document.getElementById('title-required-indicator');
    const titleValue = titleInput.value.trim();

    if (!titleValue) {
        e.preventDefault();
        titleInput.classList.add('is-invalid');
        titleError.classList.remove('d-none');
        if (titleIndicator) {
            titleIndicator.classList.add('text-danger');
        }
        titleInput.focus();

        // Scroll to the title field
        titleInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return false;
    } else {
        titleInput.classList.remove('is-invalid');
        titleError.classList.add('d-none');
        if (titleIndicator) {
            titleIndicator.classList.remove('text-danger');
        }
    }

    // Convert Start and End Date local time to UTC
    const startInput = document.getElementById('start_date');
    const endInput = document.getElementById('end_date');

    if (startInput.value) {
        const startDate = new Date(startInput.value);
        document.getElementById('start_date_utc').value = startDate.toISOString().slice(0, 16);
    }

    if (endInput.value) {
        const endDate = new Date(endInput.value);
        document.getElementById('end_date_utc').value = endDate.toISOString().slice(0, 16);
    }


    console.log('Form submit triggered');
    const questions = [];
    const questionCards = document.querySelectorAll('.question-card');
    console.log('Found', questionCards.length, 'question cards');
    let validationErrors = [];

    // Validate that at least one question exists
    if (questionCards.length === 0) {
        e.preventDefault();

        // Clear previous validation errors
        document.querySelectorAll('.validation-error').forEach(el => el.remove());
        document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));

        const questionsContainer = document.getElementById('questions-container');
        const errorDiv = document.createElement('div');
        errorDiv.className = 'text-danger small mt-2 validation-error';
        errorDiv.innerHTML = '<i class="bi bi-exclamation-circle"></i> {% trans "Please add at least one question." %}';
        questionsContainer.appendChild(errorDiv);

        questionsContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return false;
    }

    questionCards.forEach(card => {
        const questionData = {
            _cardId: card.dataset.questionId,
            order: parseInt(card.dataset.order),
            text: card.querySelector('.question-text').value,
            type: card.querySelector('.question-type').value,
            required: card.querySelector('.question-required').checked,
            help_text: card.querySelector('.question-help').value
        };

        // Validate question text is not empty
        if (!questionData.text.trim()) {
            validationErrors.push({
                questionId: card.dataset.questionId,
                questionOrder: questionData.order,
                type: 'question_text',
                message: '{% trans "Please enter question text." %}'
            });
        }

        // Validate question type is selected
        if (!questionData.type) {
            validationErrors.push({
                questionId: card.dataset.questionId,
                questionOrder: questionData.order,
                type: 'question_type',
                message: '{% trans "Please select a question type." %}'
            });
        }

        // Include existing question ID if present (edit mode)
        if (card.dataset.existingId) {
            questionData.id = parseInt(card.dataset.existingId);
        }

        // Add type-specific data
        if (['MC', 'MS', 'RK'].includes(questionData.type)) {
            // Check if using Post-based choices
            const usePostsCheckbox = card.querySelector('.use-post-choices');
            if (usePostsCheckbox && usePostsCheckbox.checked) {
                const componentSelect = card.querySelector('.post-component-select');
                const modeRadio = card.querySelector('.post-selection-mode:checked');

                questionData.post_component = componentSelect ? componentSelect.value : null;
                questionData.post_selection_mode = modeRadio ? modeRadio.value : 'all_official';

                // Validation: require component type
                if (!questionData.post_component) {
                    validationErrors.push({
                        questionId: card.dataset.questionId,
                        questionOrder: questionData.order,
                        type: 'component',
                        message: 'Please select a component type.'
                    });
                }

                // For individual mode, include selected post IDs and validate
                if (questionData.post_selection_mode === 'individual') {
                    const selectedPostIds = getSelectedPostIds(card.dataset.questionId);
                    console.log('Selected post IDs for question:', selectedPostIds);
                    questionData.post_choices = selectedPostIds;

                    // Validation: require at least 2 choices for individual mode
                    if (selectedPostIds.length < 2) {
                        validationErrors.push({
                            questionId: card.dataset.questionId,
                            questionOrder: questionData.order,
                            type: 'post_choices',
                            message: 'Please select at least 2 choices.'
                        });
                    }
                }
                // For "all official" mode, no validation needed (dynamic choices)
            } else {
                // Manual choices
                const choices = [];
                card.querySelectorAll('.choice-item').forEach(choiceItem => {
                    const input = choiceItem.querySelector('input');
                    if (input.value.trim()) {
                        const choiceData = { text: input.value.trim() };
                        if (choiceItem.dataset.existingChoiceId) {
                            choiceData.id = parseInt(choiceItem.dataset.existingChoiceId);
                        }
                        choices.push(choiceData);
                    }
                });
                questionData.choices = choices;

                // Validation: require at least 2 choices for manual mode
                if (choices.length < 2) {
                    validationErrors.push({
                        questionId: card.dataset.questionId,
                        questionOrder: questionData.order,
                        type: 'manual_choices',
                        message: 'Please add at least 2 choices.'
                    });
                }
            }
            // Collect allow_other for MC/MS questions
            const allowOtherCheckbox = card.querySelector('.allow-other-checkbox');
            if (allowOtherCheckbox) {
                questionData.allow_other = allowOtherCheckbox.checked;
            }
        } else if (questionData.type === 'YN') {
            const choices = [];
            card.querySelectorAll('.choice-item').forEach(choiceItem => {
                const input = choiceItem.querySelector('input');
                if (input.value.trim()) {
                    const choiceData = { text: input.value.trim() };
                    if (choiceItem.dataset.existingChoiceId) {
                        choiceData.id = parseInt(choiceItem.dataset.existingChoiceId);
                    }
                    choices.push(choiceData);
                }
            });
            questionData.choices = choices;
        } else if (questionData.type === 'LK') {
            const scaleSelect = card.querySelector('.likert-scale-select');
            questionData.likert_scale_id = scaleSelect ? scaleSelect.value : null;

            // Validation: require a scale to be selected
            if (!questionData.likert_scale_id) {
                validationErrors.push({
                    questionId: card.dataset.questionId,
                    questionOrder: questionData.order,
                    type: 'likert_scale',
                    message: '{% trans "Please select a scale." %}'
                });
            }
        } else if (questionData.type === 'TA') {
            // Time Availability - collect enabled days
            const dayCheckboxes = card.querySelectorAll('.ta-day-checkbox:checked');
            const enabledDays = Array.from(dayCheckboxes).map(cb => cb.value);
            questionData.ta_enabled_days = enabledDays;

            // Validation: require at least one day
            if (enabledDays.length === 0) {
                validationErrors.push({
                    questionId: card.dataset.questionId,
                    questionOrder: questionData.order,
                    type: 'ta_days',
                    message: 'Please select at least one day for the time availability question.'
                });
            }
        }

        questions.push(questionData);
    });

    // Validate response limit settings
    const limitResponsesCheck = document.getElementById('limit_responses_input');
    const waitlistThresholdInput = document.getElementById('waitlist_threshold');

    if (limitResponsesCheck && limitResponsesCheck.value === 'on') {
        const thresholdValue = waitlistThresholdInput ? waitlistThresholdInput.value.trim() : '';

        if (!thresholdValue) {
            validationErrors.push({
                type: 'waitlist',
                field: 'threshold',
                message: '{% trans "Response limit is required when Limit Responses is enabled" %}'
            });
        } else {
            const threshold = parseInt(thresholdValue);
            if (isNaN(threshold) || threshold < 1) {
                validationErrors.push({
                    type: 'waitlist',
                    field: 'threshold',
                    message: '{% trans "Response limit must be a positive number" %}'
                });
            }
        }
    }

    // Clear previous validation errors
    document.querySelectorAll('.validation-error').forEach(el => el.remove());
    document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));

    // Check for validation errors
    if (validationErrors.length > 0) {
        e.preventDefault();

        // Display inline validation errors
        validationErrors.forEach(error => {
            const card = document.querySelector(`[data-question-id="${error.questionId}"]`);

            if (error.type === 'component') {
                // Highlight component select and show error
                const componentSelect = card.querySelector('.post-component-select');
                componentSelect.classList.add('is-invalid');

                const errorDiv = document.createElement('div');
                errorDiv.className = 'invalid-feedback validation-error';
                errorDiv.textContent = error.message;
                componentSelect.parentNode.appendChild(errorDiv);

                // Scroll to first error
                if (validationErrors.indexOf(error) === 0) {
                    componentSelect.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else if (error.type === 'post_choices') {
                // Show error under selected posts section
                const selectedPostsContainer = card.querySelector('.selected-posts-list');

                const errorDiv = document.createElement('div');
                errorDiv.className = 'text-danger small mt-2 validation-error';
                errorDiv.innerHTML = `<i class="bi bi-exclamation-circle"></i> ${error.message}`;
                selectedPostsContainer.appendChild(errorDiv);

                // Scroll to first error
                if (validationErrors.indexOf(error) === 0) {
                    selectedPostsContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else if (error.type === 'manual_choices') {
                // Show error under choices section
                const choicesSection = card.querySelector('.choices-section');

                const errorDiv = document.createElement('div');
                errorDiv.className = 'text-danger small mt-2 validation-error';
                errorDiv.innerHTML = `<i class="bi bi-exclamation-circle"></i> ${error.message}`;
                choicesSection.appendChild(errorDiv);

                // Scroll to first error
                if (validationErrors.indexOf(error) === 0) {
                    choicesSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else if (error.type === 'likert_scale') {
                // Highlight scale select and show error
                const scaleSelect = card.querySelector('.likert-scale-select');
                scaleSelect.classList.add('is-invalid');

                const errorDiv = document.createElement('div');
                errorDiv.className = 'invalid-feedback validation-error';
                errorDiv.textContent = error.message;
                scaleSelect.parentNode.appendChild(errorDiv);

                // Scroll to first error
                if (validationErrors.indexOf(error) === 0) {
                    scaleSelect.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else if (error.type === 'ta_days') {
                // Show error for Time Availability days
                const errorDiv = card.querySelector(`#ta_days_error_${error.questionId}`);
                if (errorDiv) {
                    errorDiv.style.display = 'block';
                }

                // Scroll to first error
                if (validationErrors.indexOf(error) === 0) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else if (error.type === 'question_text') {
                // Highlight question text textarea and show error
                const textarea = card.querySelector('.question-text');
                textarea.classList.add('is-invalid');

                const errorDiv = document.createElement('div');
                errorDiv.className = 'invalid-feedback validation-error';
                errorDiv.textContent = error.message;
                textarea.parentNode.appendChild(errorDiv);

                // Scroll to first error
                if (validationErrors.indexOf(error) === 0) {
                    textarea.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else if (error.type === 'question_type') {
                // Highlight question type select and show error
                const select = card.querySelector('.question-type');
                select.classList.add('is-invalid');

                const errorDiv = document.createElement('div');
                errorDiv.className = 'invalid-feedback validation-error';
                errorDiv.textContent = error.message;
                select.parentNode.appendChild(errorDiv);

                // Scroll to first error
                if (validationErrors.indexOf(error) === 0) {
                    select.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else if (error.type === 'waitlist') {
                // Show error for waitlist threshold — open modal if needed
                const advModal = document.getElementById('advancedSettingsModal');
                const waitlistInput = document.getElementById('waitlist_threshold');

                function showWaitlistError() {
                    if (waitlistInput) {
                        waitlistInput.classList.add('is-invalid');

                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'invalid-feedback validation-error';
                        errorDiv.textContent = error.message;
                        waitlistInput.parentNode.appendChild(errorDiv);

                        waitlistInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }

                if (advModal && !advModal.classList.contains('show')) {
                    const modal = bootstrap.Modal.getOrCreateInstance(advModal);
                    advModal.addEventListener('shown.bs.modal', function onShown() {
                        advModal.removeEventListener('shown.bs.modal', onShown);
                        showWaitlistError();
                    }, {once: true});
                    modal.show();
                } else {
                    showWaitlistError();
                }
            }
        });

        return false;
    }

    // Walk through container children to determine section assignments
    // and serialize sections data
    const containerChildren = document.getElementById('questions-container').children;
    const sectionsPayload = [];
    let currentSectionTempId = null;
    let sectionOrder = 0;

    for (const child of containerChildren) {
        if (child.classList.contains('section-card')) {
            sectionOrder++;
            const tempId = child.dataset.sectionId;
            const sData = {
                temp_id: tempId,
                title: child.querySelector('.section-title').value,
                description: child.querySelector('.section-description').value,
                order: sectionOrder,
            };
            if (child.dataset.existingId) {
                sData.id = parseInt(child.dataset.existingId);
            }
            sectionsPayload.push(sData);
            currentSectionTempId = tempId;
        } else if (child.classList.contains('question-card')) {
            // Find the matching question data and assign section
            const cardOrder = parseInt(child.dataset.order);
            const questionId = child.dataset.questionId;
            const match = questions.find(q =>
                (q.id && child.dataset.existingId && q.id === parseInt(child.dataset.existingId)) ||
                q._cardId === questionId
            );
            if (match) {
                match.section_temp_id = currentSectionTempId;
            }
        }
    }

    // Clean up temporary _cardId fields before serialization
    questions.forEach(q => delete q._cardId);

    console.log('Questions data:', questions);
    console.log('Sections data:', sectionsPayload);
    // Store as JSON
    const jsonData = JSON.stringify(questions);
    document.getElementById('questions-data').value = jsonData;
    document.getElementById('sections-data').value = JSON.stringify(sectionsPayload);
});
