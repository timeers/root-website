{% comment %}
Shared CSS styles for survey templates
Include this in {% block styles %} for survey-related pages
{% endcomment %}

<style>
    /* Survey creation/editing styles */
    .question-card {
        border-left: 4px solid #007bff;
        margin-bottom: 1rem;
    }

    .question-header {
        background-color: #f8f9fa;
        padding: 0.75rem 1rem;
        display: flex;
        justify-content: between;
        align-items: center;
    }

    .choice-item {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
    }

    .choice-item input {
        flex: 1;
    }

    .choice-item input[readonly] {
        background-color: #e9ecef;
        cursor: not-allowed;
    }

    .drag-handle {
        cursor: move;
        color: #6c757d;
    }

    .sortable-ghost {
        opacity: 0.4;
        background-color: #f8f9fa;
    }

    /* Survey response form styles */
    .form-check {
        padding-left: 1.5em;
        margin-bottom: 0.5rem;
    }

    .form-check-input {
        margin-top: 0.25rem;
    }

    .form-check-label {
        margin-left: 0.25rem;
    }

    /* Ranking question styles */
    .ranking-list {
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
        padding: 0.5rem;
        min-height: 100px;
    }

    .ranking-item {
        background-color: white;
        border: 2px solid #dee2e6;
        border-radius: 0.375rem;
        padding: 0.75rem 1rem;
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        cursor: move;
        transition: all 0.2s ease;
    }

    .ranking-item:hover {
        border-color: #0d6efd;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
    }

    .ranking-number {
        background-color: #0d6efd;
        color: white;
        border-radius: 50%;
        width: 2rem;
        height: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        flex-shrink: 0;
    }

    .ranking-handle {
        color: #6c757d;
        font-size: 1.25rem;
        flex-shrink: 0;
    }

    .ranking-text {
        flex: 1;
        font-weight: 500;
    }

    .ranking-item.sortable-ghost {
        opacity: 0.4;
        background-color: #e9ecef;
    }

    .ranking-item.sortable-drag {
        opacity: 1;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    }

    /* Time Availability styles */
    .time-availability-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.5rem;
        margin-bottom: 1rem;
    }

    .time-slot-item {
        position: relative;
    }

    .time-slot-item label {
        font-size: 0.9rem;
        padding: 0.5rem;
        white-space: nowrap;
    }

    .time-slot-item .btn-check:checked + label {
        background-color: #0d6efd;
        color: white;
        border-color: #0d6efd;
    }

    /* Time Availability Day Selection */
    .ta-days-container {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        padding: 0.5rem;
        background-color: #f8f9fa;
        border-radius: 0.375rem;
    }

    .ta-days-container .form-check-inline {
        margin-right: 0;
    }

    /* Open Ended textarea styling */
    .modern-textarea {
        border: 2px solid #dee2e6;
        border-radius: 0.5rem;
        padding: 0.75rem;
        font-size: 1rem;
        line-height: 1.5;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }

    .modern-textarea:focus {
        border-color: #0d6efd;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
    }

    .modern-textarea::placeholder {
        color: #6c757d;
        opacity: 0.6;
    }

    /* Section (page break) card styles in survey builder */
    .section-card {
        border: 1px solid #198754;
        border-radius: 0.375rem;
        margin-bottom: 1rem;
        background-color: #f0fdf4;
    }

    .section-card {
        cursor: pointer;
    }

    .section-card.is-active {
        cursor: default;
    }

    .section-card:not(.is-active):hover {
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.1);
    }

    .section-card-header {
        padding: 0.5rem 1rem;
        display: flex;
        align-items: center;
    }

    .section-card.is-active .section-card-header {
        border-bottom: 1px solid #c3e6cb;
    }

    .section-card-body {
        display: none;
        padding: 0.5rem 1rem;
    }

    .section-card.is-active .section-card-body {
        display: block;
    }

    .section-collapsed-preview {
        font-size: 0.85rem;
        color: #6c757d;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 60%;
    }

    .section-card.is-active .section-collapsed-preview {
        display: none;
    }

    .section-card .section-title::placeholder,
    .section-card .section-description::placeholder {
        color: #6c757d;
        opacity: 0.6;
    }

    /* Section navigation in take_survey */
    .survey-section-indicator {
        font-size: 0.9rem;
    }

    /* Collapsible question cards */
    .question-card {
        cursor: pointer;
    }

    .question-card.is-active {
        cursor: default;
    }

    .question-card:not(.is-active):hover {
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.1);
    }

    .question-card-body {
        display: none;
        {% comment %} max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease; {% endcomment %}
    }

    .question-card.is-active .question-card-body {
        display: block;
        {% comment %} max-height: 2000px;
        transition: max-height 0.4s ease; {% endcomment %}
    }

    .question-collapsed-preview {
        font-size: 0.85rem;
        color: #6c757d;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 60%;
    }

    .question-card.is-active .question-collapsed-preview {
        display: none;
    }

    .question-header {
        user-select: none;
    }

    .question-card.is-active .question-header {
        border-bottom: 1px solid #dee2e6;
    }

    /* Utility classes */
    .gap-2 {
        gap: 0.5rem;
    }

    /* Advanced settings summary badges */
    .advanced-setting-badge {
        font-weight: 500;
        font-size: 0.75rem;
        padding: 0.35em 0.65em;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
        .time-availability-grid {
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        }
    }
</style>
