
<script>
// Asset mode toggle functionality
(function() {
    const modeDescriptions = {
        'OPEN': 'All factions, decks, maps, etc can be used in this series.',
        'OFFICIAL': 'All official content is automatically included in this series.',
        'SELECTED': 'Only the assets you select will be available in this series.'
    };

    const assetModeOptions = document.querySelectorAll('.asset-mode-option');
    const modeSlider = document.getElementById('mode-slider');
    const modeDescriptionText = document.getElementById('mode-description-text');
    const assetModeInput = document.getElementById('asset_mode_input');
    const clockworkWrapper = document.getElementById('clockwork-wrapper');

    // Function to update UI based on mode
    function updateUIForMode(mode) {
        // Update description
        if (modeDescriptionText) {
            modeDescriptionText.textContent = modeDescriptions[mode];
        }

        // Show/hide clockwork option (hide for SELECTED mode)
        if (clockworkWrapper) {
            clockworkWrapper.style.display = (mode === 'SELECTED') ? 'none' : 'block';
        }

        // Call any custom callback if defined
        if (typeof window.onAssetModeChange === 'function') {
            window.onAssetModeChange(mode);
        }
    }

    // Activate a given option element: highlight it, move the slider, sync the
    // hidden input, and update the description.
    function activateOption(option) {
        assetModeOptions.forEach(opt => opt.classList.remove('active'));
        option.classList.add('active');
        if (modeSlider) {
            modeSlider.className = 'asset-mode-slider position-' + option.dataset.position;
        }
        assetModeInput.value = option.dataset.value;
        updateUIForMode(option.dataset.mode);
    }

    // Set initial state based on current value, falling back to the first
    // option (Open/Any) so the toggle is never left visually selected but
    // unset — which happened when the value didn't match any option.
    const currentValue = assetModeInput.value;
    let initialOption = Array.from(assetModeOptions).find(
        option => option.dataset.value === currentValue
    );
    if (!initialOption) {
        initialOption = assetModeOptions[0];
    }
    if (initialOption) {
        activateOption(initialOption);
    }

    // Handle toggle clicks
    assetModeOptions.forEach(option => {
        option.addEventListener('click', function() {
            activateOption(this);
        });
    });
})();
</script>
