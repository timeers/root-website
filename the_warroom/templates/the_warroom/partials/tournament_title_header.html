    <div class="d-flex justify-content-between align-items-start mb-2 flex-wrap gap-2">
        <div>
            <h1 class="mb-0 root-title">{{ page_name }}</h1>
            <small class="text-muted">
            {% if tournament.guild %}
            {% if user_in_guild %}{{ tournament.guild }}{% else %}Discord Guild{% endif %}
            {% endif %}
            {{tournament.classification}}
            {% if tournament.designer %}
            hosted by <strong><a href={{tournament.designer.get_absolute_url}}>{{ tournament.designer.name }}</a></strong>
            {% endif %}
            </small>
        </div>
    </div>
