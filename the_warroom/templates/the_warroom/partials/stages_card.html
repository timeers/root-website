<div class="card h-100">
    <div class="card-body">
        <h5 class="card-title root-title">
            <i class="bi bi-diagram-3 me-2"></i>Stages
        </h5>
        {% if tournament_stages %}
            <ul class="list-group list-group-flush mb-0">
                {% for s in tournament_stages %}
                    <li class="list-group-item px-0 d-flex justify-content-between align-items-center">
                        <a href="{% url 'stage-settings' tournament_slug=tournament.slug stage_slug=s.slug %}">
                            {{ s.name }}
                        </a>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="card-text text-muted">
                Create a new stage within {{ tournament }}
            </p>
        {% endif %}
    </div>
    <div class="card-footer bg-transparent">
        <div class="d-flex flex-column flex-md-row gap-2">
            <a href="{% url 'stage-create' tournament_slug=tournament.slug %}" class="btn btn-primary flex-md-fill">
                <i class="bi bi-plus-lg me-1"></i>New Stage
            </a>
            {% if tournament_stages|length <= 1 %}
            <button type="button"
                    class="btn btn-outline-secondary flex-md-fill"
                    data-enable-url="{% url 'tournament-disable-stages' tournament_slug=tournament.slug %}"
                    data-enable-slot="stages-card-slot">
                <i class="bi bi-x-lg me-1"></i>Disable Stages
            </button>
            {% endif %}
        </div>
    </div>
</div>
