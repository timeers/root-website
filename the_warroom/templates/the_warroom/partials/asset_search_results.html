{% load custom_filters %}
{% if assets %}
<div class="search-results border rounded p-2 bg-white">
    <h6 class="text-muted mb-2"><i class="bi bi-plus-circle me-2"></i>Click to add:</h6>
    <div class="list-group list-group-flush">
        {% for asset in assets %}
        <button
            class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-2"
            hx-post="{% url 'tournament-add-asset' slug=tournament.slug asset_type=asset_type asset_id=asset.id %}"
            hx-target="#{{ asset_type }}s-list"
            hx-swap="beforeend"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            hx-on="htmx:afterRequest: if(event.detail.successful) { this.remove(); updateAssetCount('{{ asset_type }}'); }">
            <div class="d-flex align-items-center">
                {% if asset.small_icon %}
                <img src="{{ asset.small_icon|cache_bust:asset.small_icon_version }}" alt="{{ asset.title }}" class="me-2" style="width: 24px; height: 24px; object-fit: contain;">
                {% else %}
                <i class="bi bi-box me-2 text-muted"></i>
                {% endif %}
                <span>{{ asset.title }}</span>
                {% if not asset.official %}
                <span class="badge bg-secondary ms-2" style="font-size: 0.65rem;">Fan</span>
                {% endif %}
            </div>
            <i class="bi bi-plus-circle text-primary"></i>
        </button>
        {% endfor %}
    </div>
</div>
{% elif request.GET.q %}
<div class="search-results border rounded p-2 bg-white">
    <p class="text-muted mb-0"><i class="bi bi-info-circle me-2"></i>No {% if tournament.platform == 'Root Digital' %}Root Digital {% endif %}{{ asset_type }}s found matching "{{ request.GET.q }}"</p>
</div>
{% endif %}
