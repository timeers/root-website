<div class="card h-100">
    <div class="card-body">
        <h5 class="card-title root-title">
            <i class="bi bi-list-ol me-2"></i>Rounds
        </h5>
        {% if stage_rounds %}
            <ul class="list-group list-group-flush mb-0">
                {% for r in stage_rounds %}
                    <li class="list-group-item px-0 d-flex justify-content-between align-items-center">
                        <a href="{{ r.get_settings_url }}">{{ r.name }}</a>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="card-text text-muted">
                Create a new round within {{ stage.name }}
            </p>
        {% endif %}
    </div>
    <div class="card-footer bg-transparent">
        <div class="d-flex flex-column flex-md-row gap-2">
            <a href="{% url 'round-create' tournament_slug=tournament.slug stage_slug=stage.slug %}" class="btn btn-primary flex-md-fill">
                <i class="bi bi-plus-lg me-1"></i>New Round
            </a>
            {% if stage_rounds|length <= 1 %}
            <button type="button"
                    class="btn btn-outline-secondary flex-md-fill"
                    data-enable-url="{% url 'stage-disable-rounds' tournament_slug=tournament.slug stage_slug=stage.slug %}"
                    data-enable-slot="rounds-card-slot">
                <i class="bi bi-dash-lg me-1"></i>Disable Rounds
            </button>
            {% endif %}
        </div>
    </div>
</div>
