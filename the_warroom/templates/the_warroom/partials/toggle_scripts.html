
<script>
// Generic toggle initializer for option-toggle sliders
function initToggle(config) {
    // config: { containerId, inputId, sliderId, descriptionId, descriptions, sliderClass }
    const container = document.getElementById(config.containerId);
    if (!container) return;

    const options = container.querySelectorAll('.option-item');
    const slider = document.getElementById(config.sliderId);
    const descriptionText = document.getElementById(config.descriptionId);
    const input = document.getElementById(config.inputId);

    if (!input || options.length === 0) return;

    function updateUI(value) {
        if (descriptionText) {
            descriptionText.textContent = config.descriptions[value] !== undefined
                ? config.descriptions[value]
                : config.descriptions[Object.keys(config.descriptions)[0]];
        }
    }

    // Set initial state
    const currentValue = input.value || '';
    options.forEach(option => {
        if (option.dataset.value === currentValue) {
            option.classList.add('active');
            if (slider) {
                slider.className = (config.sliderClass || 'option-slider') + ' position-' + option.dataset.position;
            }
            updateUI(currentValue);
        }
    });

    // Handle clicks
    options.forEach(option => {
        option.addEventListener('click', function() {
            const selectedValue = this.dataset.value;
            const selectedPosition = this.dataset.position;

            options.forEach(opt => opt.classList.remove('active'));
            this.classList.add('active');

            if (slider) {
                slider.className = (config.sliderClass || 'option-slider') + ' position-' + selectedPosition;
            }

            input.value = selectedValue;
            updateUI(selectedValue);
            if (typeof config.onChange === 'function') config.onChange(selectedValue);
        });
    });
}
</script>
