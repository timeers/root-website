{% load i18n %}

<style>
.asset-card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 0.5rem;
}
.asset-card {
    border-radius: 0.375rem;
    overflow: hidden;
    border: 1px solid var(--bs-border-color);
    background: var(--bs-tertiary-bg);
    text-align: center;
}
.asset-card-img {
    aspect-ratio: 1;
    overflow: hidden;
}
.asset-card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.asset-card-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    aspect-ratio: 1;
}
.asset-card-title {
    padding: 0.3rem 0.4rem;
    font-size: 0.75rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
</style>

{% for asset_type, label, assets, icon in asset_types %}
{% if assets %}
<div class="mb-3">
    <h6 class="text-muted mb-2">
        <i class="bi {{ icon }} me-1"></i>{{ label }}
        <span class="badge bg-secondary ms-1">{{ assets|length }}</span>
    </h6>
    <div class="asset-card-grid">
        {% for asset in assets %}
        <a href="{{ asset.get_absolute_url }}" class="text-decoration-none text-body">
            <div class="asset-card">
                <div class="asset-card-img">
                    {% if asset.picture %}
                    <img src="{% if asset.small_picture %}{{ asset.small_picture.url }}{% else %}{{ asset.picture.url }}{% endif %}" alt="{{ asset.title }}">
                    {% else %}
                    <div class="asset-card-placeholder"><i class="bi bi-image text-muted"></i></div>
                    {% endif %}
                </div>
                <div class="root-title asset-card-title"{% if asset.color %} style="border-bottom: 2px solid {{ asset.color }};"{% endif %}>
                    {{ asset.title }}
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
{% endif %}
{% endfor %}
