{% load i18n %}
{% for tournament in series_list %}
    {% include 'the_warroom/partials/series_list_item.html' with item=tournament %}
{% endfor %}
{% if has_more %}
    <button type="button"
            class="list-group-item list-group-item-action text-center text-primary"
            hx-get="?load_type={{ load_type }}&{{ load_type }}_offset={{ offset }}"
            hx-target="this"
            hx-swap="outerHTML">
        <i class="bi bi-arrow-down-circle"></i> {% trans 'Load more' %}
    </button>
{% endif %}
