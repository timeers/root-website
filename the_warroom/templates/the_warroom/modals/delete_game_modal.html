{% load i18n %}
<div class="modal fade" id="deleteGameModal" tabindex="-1" aria-labelledby="deleteGameModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title" id="deleteGameModalLabel">
                    <i class="bi bi-exclamation-triangle"></i> {% trans 'Delete Game' %}
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-warning">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <strong>{% trans 'Warning:' %}</strong> {% trans 'This action cannot be undone.' %}
                </div>
                <p>{% trans 'Are you sure you want to permanently delete this game?' %}</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans 'Cancel' %}</button>
                <a href="{{ object.get_delete_url }}" class="btn btn-danger">
                    <i class="bi bi-trash"></i> {% trans 'Delete Permanently' %}
                </a>
            </div>
        </div>
    </div>
</div>
