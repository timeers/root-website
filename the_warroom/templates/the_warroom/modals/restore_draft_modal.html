{% load i18n static %}
<style>
    /* Read-only preview grid inside the restore modal. Mirrors the Game Detail
       box score (partials/box_score.html) but without a faction-icon column,
       since a draft isn't linked to specific factions. */
    #restore-draft-preview .scorecard-score-grid {
        border-collapse: collapse;
        width: auto;
        font-size: 0.9rem;
        margin-bottom: 0;
    }
    #restore-draft-preview .scorecard-score-grid th,
    #restore-draft-preview .scorecard-score-grid td {
        border: 1px solid var(--bs-border-color, #dee2e6);
        padding: 2px 2px;
        text-align: center;
        vertical-align: middle;
        min-width: 40px;
        height: 38px;
    }
    #restore-draft-preview .scorecard-score-grid th { font-weight: 600; }
    #restore-draft-preview .scorecard-score-grid .sg-row-label {
        font-weight: 600;
        text-align: left;
        white-space: nowrap;
        padding-left: 6px;
        padding-right: 8px;
    }
    #restore-draft-preview .scorecard-score-grid .sg-cell { position: relative; }
    #restore-draft-preview .scorecard-score-grid .sg-dom-tag {
        position: absolute;
        top: 1px;
        right: 1px;
        height: 0.9em;
        width: auto;
    }
</style>
<div class="modal fade" id="restoreDraftModal" tabindex="-1" aria-labelledby="restoreDraftModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-info text-dark">
                <h5 class="modal-title" id="restoreDraftModalLabel">
                    <i class="bi bi-clock-history"></i> {% trans 'Restore unsaved Box Score?' %}
                </h5>
            </div>
            <div class="modal-body">
                <p>{% blocktrans %}We found box score data you entered but didn't save on this device.{% endblocktrans %}</p>
                <div id="restore-draft-preview" class="mb-2"></div>
                <p class="mb-0"><small class="text-muted"><i class="bi bi-info-circle"></i> <span id="restore-draft-when"></span></small></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-danger" id="restore-draft-discard">
                    <i class="bi bi-trash"></i> {% trans 'Discard' %}
                </button>
                <button type="button" class="btn btn-info" id="restore-draft-confirm">
                    <i class="bi bi-arrow-counterclockwise"></i> {% trans 'Restore' %}
                </button>
            </div>
        </div>
    </div>
</div>
