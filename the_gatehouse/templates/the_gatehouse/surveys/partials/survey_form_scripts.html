<script>
let questionCounter = 0;
const questionsData = [];
let sortableInstance = null;

const questionTypes = {
    'YN': 'Yes/No',
    'OE': 'Open Ended',
    'MC': 'Multiple Choice',
    'MS': 'Multiple Selection',
    'LK': 'Scale',
    'RK': 'Ranking',
    'TA': 'Time Availability',
    'DY': 'Day Availability',
    'DA': 'Date',
    'TI': 'Time',
    'DT': 'Date & Time',
    'NU': 'Numeric'
};

// Component types for Post-based choices
const componentTypes = {
    'Faction': 'Faction',
    'Map': 'Map',
    'Deck': 'Deck',
    'Hireling': 'Hireling',
    'Vagabond': 'Vagabond',
    'Landmark': 'Landmark',
    'Clockwork': 'Clockwork',
    'Tweak': 'House Rule'
};

const likertScales = [
    {% for scale in likert_scales %}
    {
        id: {{ scale.id }},
        name: '{{ scale.name }}',
        min_value: {{ scale.min_value }},
        max_value: {{ scale.max_value }},
        min_label: '{{ scale.min_label|escapejs }}',
        max_label: '{{ scale.max_label|escapejs }}',
        labels: {{ scale.labels|safe }}
    },
    {% endfor %}
];

{% if existing_questions %}
// Load existing questions on page load (edit mode)
const existingQuestions = {{ existing_questions|safe }};
{% endif %}

function initializeSortable() {
    const container = document.getElementById('questions-container');

    // Check if Sortable is available
    if (typeof Sortable === 'undefined') {
        console.error('Sortable library not loaded');
        return;
    }

    // Destroy existing instance if it exists
    if (sortableInstance) {
        sortableInstance.destroy();
    }

    // Only initialize if there are questions
    if (container.querySelectorAll('.question-card').length > 0) {
        sortableInstance = new Sortable(container, {
            animation: 150,
            handle: '.drag-handle',
            ghostClass: 'sortable-ghost',
            onEnd: function(evt) {
                renumberQuestions();
            }
        });
    }
}

{% if existing_questions %}
function loadExistingQuestions() {
    const container = document.getElementById('questions-container');
    container.innerHTML = '';

    existingQuestions.forEach((question, index) => {
        questionCounter++;
        const questionId = `question-${questionCounter}`;

        // Check if question has responses
        const hasResponses = question.has_responses || false;
        const responseCount = question.response_count || 0;

        // Build response warning badge
        const responseBadge = hasResponses ? `
            <span class="badge bg-warning text-dark ms-2" title="${responseCount} response(s) recorded">
                <i class="bi bi-exclamation-triangle-fill"></i> ${responseCount} response(s)
            </span>
        ` : '';

        // Modify delete button based on responses
        const deleteButton = hasResponses ? `
            <button type="button" class="btn btn-sm btn-warning" onclick="confirmHideQuestion('${questionId}')"
                    title="This question has responses and will be hidden instead of deleted">
                <i class="bi bi-eye-slash"></i>
            </button>
        ` : `
            <button type="button" class="btn btn-sm btn-danger" onclick="removeQuestion('${questionId}')">
                <i class="bi bi-trash"></i>
            </button>
        `;

        const questionHtml = `
            <div class="card question-card ${hasResponses ? 'border-warning' : ''}" data-question-id="${questionId}" data-order="${index + 1}" data-existing-id="${question.id}" data-has-responses="${hasResponses}" data-response-count="${responseCount}">
                <div class="question-header ${hasResponses ? 'bg-warning-subtle' : ''}">
                    <span class="drag-handle me-2">
                        <i class="bi bi-grip-vertical"></i>
                    </span>
                    <span class="flex-fill"><strong>Question ${index + 1}</strong>${responseBadge}</span>
                    ${deleteButton}
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Question Text <span class="text-danger">*</span></label>
                        <textarea class="form-control question-text" rows="2" required>${question.text}</textarea>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Question Type <span class="text-danger">*</span></label>
                            <select class="form-select question-type" onchange="handleTypeChange('${questionId}')">
                                <option value="">Select type...</option>
                                ${Object.entries(questionTypes).map(([key, value]) =>
                                    '<option value="' + key + '" ' + (question.type === key ? 'selected' : '') + '>' + value + '</option>'
                                ).join('')}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check mt-4">
                                <input class="form-check-input question-required" type="checkbox" ${question.required ? 'checked' : ''}>
                                <label class="form-check-label">Required</label>
                            </div>
                        </div>
                    </div>

                    <div class="type-specific-options"></div>

                    <div class="mb-3">
                        <label class="form-label">Help Text (optional)</label>
                        <input type="text" class="form-control question-help" placeholder="Additional guidance for respondents" value="${question.help_text || ''}">
                    </div>
                </div>
            </div>
        `;

        container.insertAdjacentHTML('beforeend', questionHtml);

        // Load type-specific options
        if (question.type) {
            handleTypeChange(questionId, question);
        }
    });

    initializeSortable();
}
{% endif %}

function loadQuestionFromTemplate(templateData) {
    questionCounter++;
    const questionId = `question-${questionCounter}`;
    const container = document.getElementById('questions-container');

    // Remove "no questions" message if present
    if (container.querySelector('p.text-muted')) {
        container.innerHTML = '';
    }

    const questionHtml = `
        <div class="card question-card" data-question-id="${questionId}" data-order="${questionCounter}">
            <div class="question-header">
                <span class="drag-handle me-2">
                    <i class="bi bi-grip-vertical"></i>
                </span>
                <span class="flex-fill"><strong>Question ${questionCounter}</strong></span>
                <button type="button" class="btn btn-sm btn-danger" onclick="removeQuestion('${questionId}')">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Question Text <span class="text-danger">*</span></label>
                    <textarea class="form-control question-text" rows="2" required>${templateData.text || ''}</textarea>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Question Type <span class="text-danger">*</span></label>
                        <select class="form-select question-type" onchange="handleTypeChange('${questionId}')">
                            <option value="">Select type...</option>
                            ${Object.entries(questionTypes).map(([key, value]) =>
                                '<option value="' + key + '" ' + (templateData.type === key ? 'selected' : '') + '>' + value + '</option>'
                            ).join('')}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check mt-4">
                            <input class="form-check-input question-required" type="checkbox" ${templateData.required ? 'checked' : ''}>
                            <label class="form-check-label">Required</label>
                        </div>
                    </div>
                </div>

                <div class="type-specific-options"></div>

                <div class="mb-3">
                    <label class="form-label">Help Text (optional)</label>
                    <input type="text" class="form-control question-help" placeholder="Additional guidance for respondents" value="${templateData.help_text || ''}">
                </div>

            </div>
        </div>
    `;

    container.insertAdjacentHTML('beforeend', questionHtml);

    // Load type-specific options if type is set
    if (templateData.type) {
        const card = document.querySelector(`[data-question-id="${questionId}"]`);
        const optionsContainer = card.querySelector('.type-specific-options');

        if (templateData.type === 'YN') {
            // Yes/No question - fixed choices
            optionsContainer.innerHTML = `
                <div class="choices-section">
                    <label class="form-label">Choices</label>
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> <strong>Yes/No Question</strong><br>
                        <small>This question type has fixed choices: "Yes" and "No".</small>
                    </div>
                    <div class="choices-list"></div>
                </div>
            `;

            // Add fixed Yes/No choices
            addChoice(questionId, 'Yes', null, true);
            addChoice(questionId, 'No', null, true);
        } else if (['MC', 'MS', 'RK'].includes(templateData.type) && templateData.choices) {
            optionsContainer.innerHTML = `
                <div class="choices-section">
                    <label class="form-label">Choices <span class="text-danger">*</span></label>
                    <div class="choices-list"></div>
                    <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addChoice('${questionId}')">
                        <i class="bi bi-plus"></i> Add Choice
                    </button>
                </div>
            `;

            // Add choices from template
            templateData.choices.forEach(choiceText => {
                addChoice(questionId, choiceText);
            });
        } else if (templateData.type === 'LK') {
            const scaleOptions = likertScales.map(s =>
                '<option value="' + s.id + '" ' + (templateData.likert_scale_id == s.id ? 'selected' : '') + '>' + s.name + '</option>'
            ).join('');

            optionsContainer.innerHTML = `
                <div class="mb-3">
                    <label class="form-label">Scale <span class="text-danger">*</span></label>
                    <select class="form-select likert-scale-select" onchange="updateLikertPreview('${questionId}')" required>
                        <option value="">Select scale...</option>
                        ${scaleOptions}
                    </select>
                    <small class="form-text text-muted">
                        Request additional Scales from an Admin if needed.
                    </small>
                </div>
                <div class="likert-preview-container"></div>
            `;

            // Show preview if scale is already selected
            if (templateData.likert_scale_id) {
                setTimeout(() => updateLikertPreview(questionId), 0);
            }
        }
    }

    initializeSortable();
}

function addQuestion() {
    questionCounter++;
    const questionId = `question-${questionCounter}`;

    const container = document.getElementById('questions-container');

    // Remove "no questions" message if present
    if (container.querySelector('p.text-muted')) {
        container.innerHTML = '';
    }

    const questionHtml = `
        <div class="card question-card" data-question-id="${questionId}" data-order="${questionCounter}">
            <div class="question-header">
                <span class="drag-handle me-2">
                    <i class="bi bi-grip-vertical"></i>
                </span>
                <span class="flex-fill"><strong>Question ${questionCounter}</strong></span>
                <button type="button" class="btn btn-sm btn-danger" onclick="removeQuestion('${questionId}')">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Question Text <span class="text-danger">*</span></label>
                    <textarea class="form-control question-text" rows="2" required></textarea>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Question Type <span class="text-danger">*</span></label>
                        <select class="form-select question-type" onchange="handleTypeChange('${questionId}')">
                            <option value="">Select type...</option>
                            ${Object.entries(questionTypes).map(([key, value]) =>
                                '<option value="' + key + '">' + value + '</option>'
                            ).join('')}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check mt-4">
                            <input class="form-check-input question-required" type="checkbox" checked>
                            <label class="form-check-label">Required</label>
                        </div>
                    </div>
                </div>

                <div class="type-specific-options"></div>

                <div class="mb-3">
                    <label class="form-label">Help Text (optional)</label>
                    <input type="text" class="form-control question-help" placeholder="Additional guidance for respondents">
                </div>

            </div>
        </div>
    `;

    container.insertAdjacentHTML('beforeend', questionHtml);
    initializeSortable();
}

function removeQuestion(questionId) {
    const question = document.querySelector(`[data-question-id="${questionId}"]`);
    if (question && confirm('Are you sure you want to remove this question?')) {
        question.remove();
        renumberQuestions();
    }
}

function confirmHideQuestion(questionId) {
    const question = document.querySelector(`[data-question-id="${questionId}"]`);
    const responseCount = question.dataset.responseCount || 'some';

    if (confirm(`This question has ${responseCount} recorded response(s).\n\nRemoving it will HIDE the question (not delete it) to preserve data integrity.\n\nHidden questions won't appear in the survey but their answers are kept for reporting.\n\nContinue?`)) {
        question.remove();
        renumberQuestions();
    }
}

function renumberQuestions() {
    const questions = document.querySelectorAll('.question-card');
    questions.forEach((q, idx) => {
        q.dataset.order = idx + 1;
        q.querySelector('.question-header strong').textContent = `Question ${idx + 1}`;
    });
}

function handleTypeChange(questionId, existingData = null) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const typeSelect = card.querySelector('.question-type');
    const optionsContainer = card.querySelector('.type-specific-options');
    const type = typeSelect.value;

    optionsContainer.innerHTML = '';

    if (type === 'TA') {
        // Time Availability - automatically creates 24 UTC hour choices
        optionsContainer.innerHTML = `
            <div class="alert alert-info">
                <i class="bi bi-clock"></i> <strong>Time Availability Question</strong><br>
                <small>This question type automatically creates 24 hour slots (0-23 UTC).
                Respondents will see times in their local timezone, and selections are stored as UTC hours.</small>
            </div>
        `;
    } else if (type === 'DY') {
        // Day Availability - automatically creates day choices
        optionsContainer.innerHTML = `
            <div class="alert alert-info">
                <i class="bi bi-calendar"></i> <strong>Day Availability Question</strong><br>
                <small>This question type automatically creates 7 day slots (Monday-Sunday).</small>
            </div>
        `;
    } else if (type === 'YN') {
        // Yes/No question - fixed choices
        optionsContainer.innerHTML = `
            <div class="choices-section">
                <label class="form-label">Choices</label>
                <div class="alert alert-info">
                    <i class="bi bi-info-circle"></i> <strong>Yes/No Question</strong><br>
                    <small>This question type has fixed choices: "Yes" and "No".</small>
                </div>
                <div class="choices-list"></div>
            </div>
        `;

        // Add fixed Yes/No choices (readonly)
        if (existingData && existingData.choices && existingData.choices.length === 2) {
            existingData.choices.forEach(choice => {
                addChoice(questionId, choice.text, choice.id, true);
            });
        } else {
            addChoice(questionId, 'Yes', null, true);
            addChoice(questionId, 'No', null, true);
        }
    } else if (['MC', 'MS', 'RK'].includes(type)) {
        // Choice-based questions - with Post selection option
        const usePostBased = existingData && existingData.post_component;
        const postComponent = existingData?.post_component || '';
        const postSelectionMode = existingData?.post_selection_mode || 'all_official';

        // Show note for Multiple Selection questions
        const msNote = type === 'MS' ? `
            <div class="alert alert-info py-2 mb-3">
                <i class="bi bi-info-circle"></i>
                <small>If marked as required, respondents must select <strong>at least one</strong> option.</small>
            </div>
        ` : '';

        optionsContainer.innerHTML = `
            ${msNote}
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input use-post-choices" type="checkbox" id="use_posts_${questionId}"
                           onchange="togglePostChoices('${questionId}')" ${usePostBased ? 'checked' : ''}>
                    <label class="form-check-label" for="use_posts_${questionId}">
                        <i class="bi bi-collection"></i> Use game components as choices
                    </label>
                </div>
            </div>

            <div class="post-choices-config" style="display: ${usePostBased ? 'block' : 'none'};">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Component Type <span class="text-danger">*</span></label>
                        <select class="form-select post-component-select" onchange="updatePostSelectionMode('${questionId}')">
                            <option value="">Select component...</option>
                            ${Object.entries(componentTypes).map(([key, value]) =>
                                '<option value="' + key + '" ' + (postComponent === key ? 'selected' : '') + '>' + value + '</option>'
                            ).join('')}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Selection Mode</label>
                        <div class="mt-2">
                            <div class="form-check">
                                <input class="form-check-input post-selection-mode" type="radio" name="post_mode_${questionId}"
                                       id="mode_all_${questionId}" value="all_official"
                                       onchange="updatePostSelectionMode('${questionId}')"
                                       ${postSelectionMode === 'all_official' ? 'checked' : ''}>
                                <label class="form-check-label" for="mode_all_${questionId}">
                                    All Official
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input post-selection-mode" type="radio" name="post_mode_${questionId}"
                                       id="mode_individual_${questionId}" value="individual"
                                       onchange="updatePostSelectionMode('${questionId}')"
                                       ${postSelectionMode === 'individual' ? 'checked' : ''}>
                                <label class="form-check-label" for="mode_individual_${questionId}">
                                    Select Individual (up to 20)
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="individual-post-selection" style="display: ${postSelectionMode === 'individual' ? 'block' : 'none'};">
                    <div class="mb-2">
                        <label class="form-label">Search and Select Posts</label>
                        <div class="input-group">
                            <input type="text" class="form-control post-search-input" placeholder="Search by name..."
                                   oninput="searchPosts('${questionId}')">
                            <button class="btn btn-outline-secondary" type="button" onclick="searchPosts('${questionId}')">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </div>
                    <div class="post-search-results mb-2" style="max-height: 200px; overflow-y: auto;"></div>
                    <div class="selected-posts-list">
                        <label class="form-label">Selected Posts (<span class="selected-count">0</span>/20)</label>
                        <div class="selected-posts-container"></div>
                    </div>
                </div>

                <div class="all-official-info" style="display: ${postSelectionMode === 'all_official' ? 'block' : 'none'};">
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> All official <span class="component-type-display">${postComponent || 'components'}</span> will be loaded as choices.
                    </div>
                </div>
            </div>

            <div class="manual-choices-section" style="display: ${usePostBased ? 'none' : 'block'};">
                <div class="choices-section">
                    <label class="form-label">Choices <span class="text-danger">*</span></label>
                    <div class="choices-list"></div>
                    <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addChoice('${questionId}')">
                        <i class="bi bi-plus"></i> Add Choice
                    </button>
                </div>
            </div>
        `;

        // Add choices (only for manual mode)
        if (!usePostBased) {
            if (existingData && existingData.choices) {
                existingData.choices.forEach(choice => {
                    addChoice(questionId, choice.text, choice.id, false, choice);
                });
            } else {
                addChoice(questionId);
                addChoice(questionId);
            }
        }

        // Load existing selected posts for individual mode
        if (existingData && existingData.post_selection_mode === 'individual' && existingData.post_choices) {
            existingData.post_choices.forEach(postData => {
                addSelectedPost(questionId, postData);
            });
        }
    } else if (type === 'LK') {
        // Scale questions
        const scaleOptions = likertScales.map(s =>
            '<option value="' + s.id + '" ' + (existingData && existingData.likert_scale_id == s.id ? 'selected' : '') + '>' + s.name + '</option>'
        ).join('');

        optionsContainer.innerHTML = `
            <div class="mb-3">
                <label class="form-label">Scale <span class="text-danger">*</span></label>
                <select class="form-select likert-scale-select" onchange="updateLikertPreview('${questionId}')" required>
                    <option value="">Select scale...</option>
                    ${scaleOptions}
                </select>
                <small class="form-text text-muted">
                    Request additional Scales from an Admin if needed.
                </small>
            </div>
            <div class="likert-preview-container"></div>
        `;

        // Show preview if scale is already selected
        if (existingData && existingData.likert_scale_id) {
            setTimeout(() => updateLikertPreview(questionId), 0);
        }
    }
}

function addChoice(questionId, defaultValue = '', existingId = null, readonly = false, choiceData = null) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const choicesList = card.querySelector('.choices-list');
    const choiceId = existingId ? `choice-${existingId}` : `choice-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;

    // Check if choice has responses
    const hasResponses = choiceData?.has_responses || false;

    // Determine the delete/hide button
    let actionButton = '';
    if (!readonly) {
        if (hasResponses) {
            actionButton = `<button type="button" class="btn btn-sm btn-outline-warning" onclick="confirmHideChoice('${questionId}', '${choiceId}')" title="This choice has responses - will be hidden, not deleted"><i class="bi bi-eye-slash"></i></button>`;
        } else {
            actionButton = `<button type="button" class="btn btn-sm btn-outline-danger" onclick="removeChoice('${questionId}', '${choiceId}')"><i class="bi bi-x"></i></button>`;
        }
    }

    const choiceHtml = `
        <div class="choice-item ${hasResponses ? 'border-start border-warning border-3 ps-2' : ''}" data-choice-id="${choiceId}" ${existingId ? 'data-existing-choice-id="' + existingId + '"' : ''} data-has-responses="${hasResponses}">
            <input type="text" class="form-control ${hasResponses ? 'bg-warning-subtle' : ''}" placeholder="Choice text" value="${defaultValue}" ${readonly ? 'readonly' : ''} required>
            ${actionButton}
        </div>
    `;

    choicesList.insertAdjacentHTML('beforeend', choiceHtml);
}

function removeChoice(questionId, choiceId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const choice = card.querySelector(`[data-choice-id="${choiceId}"]`);

    // Remove the choice - form validation will check for minimum on submit
    choice.remove();
}

function confirmHideChoice(questionId, choiceId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const choice = card.querySelector(`[data-choice-id="${choiceId}"]`);

    if (confirm(`This choice has been selected in survey responses.\n\nRemoving it will HIDE the choice to preserve data integrity.\n\nHidden choices won't appear as options but existing answers are preserved.\n\nContinue?`)) {
        choice.remove();
    }
}

function updateLikertPreview(questionId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const scaleSelect = card.querySelector('.likert-scale-select');
    const previewContainer = card.querySelector('.likert-preview-container');

    if (!scaleSelect || !previewContainer) return;

    const scaleId = parseInt(scaleSelect.value);

    if (!scaleId) {
        previewContainer.innerHTML = '';
        return;
    }

    const scale = likertScales.find(s => s.id === scaleId);

    if (!scale) {
        previewContainer.innerHTML = '';
        return;
    }

    // Create range of values
    const values = [];
    for (let i = scale.min_value; i <= scale.max_value; i++) {
        values.push(i);
    }

    // Build preview HTML similar to survey_preview.html
    let previewHTML = `
        <div class="card bg-light my-2">
            <div class="card-body">
                <div class="d-flex justify-content-between mb-2">
                    <small class="text-muted">${scale.min_label}</small>
                    <small class="text-muted">${scale.max_label}</small>
                </div>
                <div class="btn-group d-flex flex-column flex-md-row gap-2" role="group">
    `;

    values.forEach(value => {
        const label = scale.labels && scale.labels[value] ? scale.labels[value] : '';
        previewHTML += `
            <div class="d-flex flex-column align-items-center flex-fill">
                <button type="button" class="btn btn-outline-primary w-100" disabled>
                    ${value}
                </button>
                ${label ? `<small class="text-muted mt-1 text-center">${label}</small>` : ''}
            </div>
        `;
    });

    previewHTML += `
                </div>
            </div>
        </div>
    `;

    previewContainer.innerHTML = previewHTML;
}

// Post selection functions
function togglePostChoices(questionId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const usePostsCheckbox = card.querySelector('.use-post-choices');
    const postConfig = card.querySelector('.post-choices-config');
    const manualChoices = card.querySelector('.manual-choices-section');

    if (usePostsCheckbox.checked) {
        postConfig.style.display = 'block';
        manualChoices.style.display = 'none';
        // Disable required validation on manual choice inputs
        const manualInputs = manualChoices.querySelectorAll('input[required]');
        manualInputs.forEach(input => {
            input.removeAttribute('required');
            input.dataset.wasRequired = 'true';
        });
    } else {
        postConfig.style.display = 'none';
        manualChoices.style.display = 'block';
        // Re-enable required validation on manual choice inputs
        const manualInputs = manualChoices.querySelectorAll('input[data-was-required="true"]');
        manualInputs.forEach(input => {
            input.setAttribute('required', '');
            input.removeAttribute('data-was-required');
        });
    }
}

function updatePostSelectionMode(questionId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const modeRadio = card.querySelector('.post-selection-mode:checked');
    const individualSection = card.querySelector('.individual-post-selection');
    const allOfficialInfo = card.querySelector('.all-official-info');
    const componentSelect = card.querySelector('.post-component-select');
    const componentDisplay = card.querySelector('.component-type-display');

    const mode = modeRadio ? modeRadio.value : 'all_official';
    const component = componentSelect ? componentSelect.value : '';

    // Clear validation errors when component is selected
    if (component) {
        componentSelect.classList.remove('is-invalid');
        const errorDiv = componentSelect.parentNode.querySelector('.validation-error');
        if (errorDiv) {
            errorDiv.remove();
        }
    }

    if (mode === 'individual') {
        individualSection.style.display = 'block';
        allOfficialInfo.style.display = 'none';
    } else {
        individualSection.style.display = 'none';
        allOfficialInfo.style.display = 'block';
    }

    // Update component type display
    if (componentDisplay && component) {
        componentDisplay.textContent = componentTypes[component] || component;
    }
}

let searchTimeout = null;
function searchPosts(questionId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const searchInput = card.querySelector('.post-search-input');
    const componentSelect = card.querySelector('.post-component-select');
    const resultsContainer = card.querySelector('.post-search-results');

    const query = searchInput.value.trim();
    const component = componentSelect.value;

    // Clear previous timeout
    if (searchTimeout) {
        clearTimeout(searchTimeout);
    }

    // Debounce search
    searchTimeout = setTimeout(() => {
        if (!component) {
            resultsContainer.innerHTML = '<div class="text-muted">Please select a component type first.</div>';
            return;
        }

        fetch(`{% url 'search-posts-for-survey' %}?q=${encodeURIComponent(query)}&component=${component}`)
            .then(response => response.json())
            .then(data => {
                if (data.posts.length === 0) {
                    resultsContainer.innerHTML = '<div class="text-muted">No results found.</div>';
                    return;
                }

                const selectedIds = getSelectedPostIds(questionId);

                resultsContainer.innerHTML = data.posts.map(post => {
                    const isSelected = selectedIds.includes(post.id);
                    return `
                        <div class="d-flex align-items-center justify-content-between p-2 border-bottom post-result-item"
                             data-post-id="${post.id}">
                            <div class="d-flex align-items-center">
                                ${post.icon_url ? `<img src="${post.icon_url}" alt="" class="mx-2 md-faction-icon">` : ''}
                                <span>${post.title}</span>
                                ${post.official ? '<span class="badge bg-success ms-2">Official</span>' : '<span class="badge bg-secondary ms-2">Fan</span>'}
                            </div>
                            <button type="button" class="btn btn-sm ${isSelected ? 'btn-secondary' : 'btn-outline-primary'}"
                                    onclick="addSelectedPost('${questionId}', {id: ${post.id}, title: '${post.title.replace(/'/g, "\\'")}', icon_url: ${post.icon_url ? `'${post.icon_url}'` : 'null'}})"
                                    ${isSelected ? 'disabled' : ''}>
                                ${isSelected ? 'Added' : 'Add'}
                            </button>
                        </div>
                    `;
                }).join('');
            })
            .catch(error => {
                console.error('Search error:', error);
                resultsContainer.innerHTML = '<div class="text-danger">Error searching posts.</div>';
            });
    }, 300);
}

function getSelectedPostIds(questionId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const selectedContainer = card.querySelector('.selected-posts-container');
    const items = selectedContainer.querySelectorAll('.selected-post-item');
    return Array.from(items).map(item => parseInt(item.dataset.postId));
}

function addSelectedPost(questionId, postData) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const selectedContainer = card.querySelector('.selected-posts-container');
    const countSpan = card.querySelector('.selected-count');
    const resultsContainer = card.querySelector('.post-search-results');

    // Check if already selected
    if (selectedContainer.querySelector(`[data-post-id="${postData.id}"]`)) {
        return;
    }

    // Check limit
    const currentCount = selectedContainer.querySelectorAll('.selected-post-item').length;
    if (currentCount >= 20) {
        alert('Maximum 20 posts allowed.');
        return;
    }

    const postHtml = `
        <div class="d-flex align-items-center justify-content-between p-2 border rounded mb-1 selected-post-item"
             data-post-id="${postData.id}">
            <div class="d-flex align-items-center">
                ${postData.icon_url ? `<img src="${postData.icon_url}" alt="" class="mx-2 md-faction-icon">` : ''}
                <span>${postData.title}</span>
            </div>
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeSelectedPost('${questionId}', ${postData.id})">
                <i class="bi bi-x"></i>
            </button>
        </div>
    `;

    selectedContainer.insertAdjacentHTML('beforeend', postHtml);
    countSpan.textContent = currentCount + 1;

    // Clear validation error if at least 2 posts are selected
    if (currentCount + 1 >= 2) {
        const selectedPostsList = card.querySelector('.selected-posts-list');
        const errorDiv = selectedPostsList.querySelector('.validation-error');
        if (errorDiv) {
            errorDiv.remove();
        }
    }

    // Update add button in search results
    const resultItem = resultsContainer.querySelector(`[data-post-id="${postData.id}"]`);
    if (resultItem) {
        const btn = resultItem.querySelector('button');
        btn.classList.remove('btn-outline-primary');
        btn.classList.add('btn-secondary');
        btn.textContent = 'Added';
        btn.disabled = true;
    }
}

function removeSelectedPost(questionId, postId) {
    const card = document.querySelector(`[data-question-id="${questionId}"]`);
    const selectedContainer = card.querySelector('.selected-posts-container');
    const countSpan = card.querySelector('.selected-count');
    const resultsContainer = card.querySelector('.post-search-results');

    const item = selectedContainer.querySelector(`[data-post-id="${postId}"]`);
    if (item) {
        item.remove();
        countSpan.textContent = selectedContainer.querySelectorAll('.selected-post-item').length;

        // Update add button in search results
        const resultItem = resultsContainer.querySelector(`[data-post-id="${postId}"]`);
        if (resultItem) {
            const btn = resultItem.querySelector('button');
            btn.classList.remove('btn-secondary');
            btn.classList.add('btn-outline-primary');
            btn.textContent = 'Add';
            btn.disabled = false;
        }
    }
}

// Serialize form data on submit
document.getElementById('survey-form').addEventListener('submit', function(e) {
    console.log('Form submit triggered');
    const questions = [];
    const questionCards = document.querySelectorAll('.question-card');
    console.log('Found', questionCards.length, 'question cards');
    let validationErrors = [];

    questionCards.forEach(card => {
        const questionData = {
            order: parseInt(card.dataset.order),
            text: card.querySelector('.question-text').value,
            type: card.querySelector('.question-type').value,
            required: card.querySelector('.question-required').checked,
            help_text: card.querySelector('.question-help').value
        };

        // Include existing question ID if present (edit mode)
        if (card.dataset.existingId) {
            questionData.id = parseInt(card.dataset.existingId);
        }

        // Add type-specific data
        if (['MC', 'MS', 'RK'].includes(questionData.type)) {
            // Check if using Post-based choices
            const usePostsCheckbox = card.querySelector('.use-post-choices');
            if (usePostsCheckbox && usePostsCheckbox.checked) {
                const componentSelect = card.querySelector('.post-component-select');
                const modeRadio = card.querySelector('.post-selection-mode:checked');

                questionData.post_component = componentSelect ? componentSelect.value : null;
                questionData.post_selection_mode = modeRadio ? modeRadio.value : 'all_official';

                // Validation: require component type
                if (!questionData.post_component) {
                    validationErrors.push({
                        questionId: card.dataset.questionId,
                        questionOrder: questionData.order,
                        type: 'component',
                        message: 'Please select a component type.'
                    });
                }

                // For individual mode, include selected post IDs and validate
                if (questionData.post_selection_mode === 'individual') {
                    const selectedPostIds = getSelectedPostIds(card.dataset.questionId);
                    console.log('Selected post IDs for question:', selectedPostIds);
                    questionData.post_choices = selectedPostIds;

                    // Validation: require at least 2 choices for individual mode
                    if (selectedPostIds.length < 2) {
                        validationErrors.push({
                            questionId: card.dataset.questionId,
                            questionOrder: questionData.order,
                            type: 'post_choices',
                            message: 'Please select at least 2 choices.'
                        });
                    }
                }
                // For "all official" mode, no validation needed (dynamic choices)
            } else {
                // Manual choices
                const choices = [];
                card.querySelectorAll('.choice-item').forEach(choiceItem => {
                    const input = choiceItem.querySelector('input');
                    if (input.value.trim()) {
                        const choiceData = { text: input.value.trim() };
                        if (choiceItem.dataset.existingChoiceId) {
                            choiceData.id = parseInt(choiceItem.dataset.existingChoiceId);
                        }
                        choices.push(choiceData);
                    }
                });
                questionData.choices = choices;

                // Validation: require at least 2 choices for manual mode
                if (choices.length < 2) {
                    validationErrors.push({
                        questionId: card.dataset.questionId,
                        questionOrder: questionData.order,
                        type: 'manual_choices',
                        message: 'Please add at least 2 choices.'
                    });
                }
            }
        } else if (questionData.type === 'YN') {
            const choices = [];
            card.querySelectorAll('.choice-item').forEach(choiceItem => {
                const input = choiceItem.querySelector('input');
                if (input.value.trim()) {
                    const choiceData = { text: input.value.trim() };
                    if (choiceItem.dataset.existingChoiceId) {
                        choiceData.id = parseInt(choiceItem.dataset.existingChoiceId);
                    }
                    choices.push(choiceData);
                }
            });
            questionData.choices = choices;
        } else if (questionData.type === 'LK') {
            const scaleSelect = card.querySelector('.likert-scale-select');
            questionData.likert_scale_id = scaleSelect ? scaleSelect.value : null;
        }

        questions.push(questionData);
    });

    // Clear previous validation errors
    document.querySelectorAll('.validation-error').forEach(el => el.remove());
    document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));

    // Check for validation errors
    if (validationErrors.length > 0) {
        e.preventDefault();

        // Display inline validation errors
        validationErrors.forEach(error => {
            const card = document.querySelector(`[data-question-id="${error.questionId}"]`);

            if (error.type === 'component') {
                // Highlight component select and show error
                const componentSelect = card.querySelector('.post-component-select');
                componentSelect.classList.add('is-invalid');

                const errorDiv = document.createElement('div');
                errorDiv.className = 'invalid-feedback validation-error';
                errorDiv.textContent = error.message;
                componentSelect.parentNode.appendChild(errorDiv);

                // Scroll to first error
                if (validationErrors.indexOf(error) === 0) {
                    componentSelect.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else if (error.type === 'post_choices') {
                // Show error under selected posts section
                const selectedPostsContainer = card.querySelector('.selected-posts-list');

                const errorDiv = document.createElement('div');
                errorDiv.className = 'text-danger small mt-2 validation-error';
                errorDiv.innerHTML = `<i class="bi bi-exclamation-circle"></i> ${error.message}`;
                selectedPostsContainer.appendChild(errorDiv);

                // Scroll to first error
                if (validationErrors.indexOf(error) === 0) {
                    selectedPostsContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else if (error.type === 'manual_choices') {
                // Show error under choices section
                const choicesSection = card.querySelector('.choices-section');

                const errorDiv = document.createElement('div');
                errorDiv.className = 'text-danger small mt-2 validation-error';
                errorDiv.innerHTML = `<i class="bi bi-exclamation-circle"></i> ${error.message}`;
                choicesSection.appendChild(errorDiv);

                // Scroll to first error
                if (validationErrors.indexOf(error) === 0) {
                    choicesSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        });

        return false;
    }

    console.log('Questions data:', questions);
    // Store as JSON
    const jsonData = JSON.stringify(questions);
    console.log('JSON data:', jsonData);
    document.getElementById('questions-data').value = jsonData;
});

// Save and Preview function (edit mode only)
function saveAndPreview() {
    const form = document.getElementById('survey-form');

    // If the form validates, add a redirect parameter and submit
    if (form.checkValidity()) {
        // Manually trigger the submit event handler to populate questions_data
        const questionCards = document.querySelectorAll('.question-card');
        const questions = [];

        questionCards.forEach(card => {
            const questionData = {
                order: parseInt(card.dataset.order),
                text: card.querySelector('.question-text').value,
                type: card.querySelector('.question-type').value,
                required: card.querySelector('.question-required').checked,
                help_text: card.querySelector('.question-help').value
            };

            if (card.dataset.existingId) {
                questionData.id = parseInt(card.dataset.existingId);
            }

            if (['MC', 'MS', 'YN', 'RK'].includes(questionData.type)) {
                const choices = [];
                card.querySelectorAll('.choice-item').forEach(choiceItem => {
                    const input = choiceItem.querySelector('input');
                    if (input.value.trim()) {
                        const choiceData = { text: input.value.trim() };
                        if (choiceItem.dataset.existingChoiceId) {
                            choiceData.id = parseInt(choiceItem.dataset.existingChoiceId);
                        }
                        choices.push(choiceData);
                    }
                });
                questionData.choices = choices;
            } else if (questionData.type === 'LK') {
                const scaleSelect = card.querySelector('.likert-scale-select');
                questionData.likert_scale_id = scaleSelect ? scaleSelect.value : null;
            }

            questions.push(questionData);
        });

        document.getElementById('questions-data').value = JSON.stringify(questions);

        // Add a hidden input to tell the backend to redirect to preview
        let redirectInput = document.getElementById('redirect-to-preview');
        if (!redirectInput) {
            redirectInput = document.createElement('input');
            redirectInput.type = 'hidden';
            redirectInput.name = 'redirect_to_preview';
            redirectInput.id = 'redirect-to-preview';
            redirectInput.value = 'true';
            form.appendChild(redirectInput);
        }

        // Submit the form
        form.submit();
    } else {
        // Show validation errors
        form.reportValidity();
    }
}
