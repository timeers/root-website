{% load i18n %}
<!-- Navigation and Actions -->
<div class="d-flex align-items-center mb-4">
    <div>
        <a href="{{back_url}}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> {{back_title}}
        </a>
    </div>
    <div class="ms-auto d-flex gap-2">
        {% if can_see_resutls %}
            <a href="{% url 'survey-results' survey.slug %}" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-bar-chart"></i> {% trans 'View Results' %}
            </a>
        {% endif %}
        {% if can_take_survey %}
            <a href="{% url 'survey-take' survey.slug %}" class="btn btn-sm btn-success">
                <i class="bi bi-list-check"></i> {% trans 'Take Survey' %}
            </a>
        {% endif %}
        {% if can_edit_survey %}
            <a href="{% url 'survey-edit' survey.slug %}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-gear"></i> {% trans 'Edit Survey' %}
            </a>
        {% endif %}
    </div>
</div>
