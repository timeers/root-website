{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#5f788a">
  <title>Offline | Root Database</title>
  <link rel="icon" href="{% static 'images/favicon.png' %}" type="image/png">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background-color: #5f788a;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
      box-sizing: border-box;
    }
    .wrap { max-width: 26rem; }
    img.logo { width: 96px; height: 96px; margin-bottom: 1.5rem; border-radius: 0.4rem; }
    h1 { font-size: 1.75rem; margin: 0 0 0.75rem; }
    p { font-size: 1rem; line-height: 1.5; margin: 0 0 1.75rem; opacity: 0.9; }
    a.button {
      display: inline-block;
      background: #fafafa;
      color: #5f788a;
      padding: 0.65rem 1.4rem;
      border-radius: 0.4rem;
      text-decoration: none;
      font-weight: 600;
    }
    a.button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="{% static 'images/icon-192.png' %}" alt="Root Database" class="logo">
    <h1>You're offline</h1>
    <p>The Root Database needs a connection. Reconnect and try again.</p>
    <a href="/" class="button" onclick="event.preventDefault(); location.reload();">Try again</a>
  </div>
</body>
</html>
