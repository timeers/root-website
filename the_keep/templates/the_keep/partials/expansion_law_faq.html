{% load static i18n %}

{% if items_count > 0 %}
<article class="d-flex content-section">
    <div class="w-100">

    <div class='row justify-content-center align-items-center'>
      {% if available_law %}
        <div class="col-6 col-md d-flex justify-content-center align-items-center">
          <a href="{% url 'expansion-law' expansion_slug=expansion.slug language_code=language_code %}"
             class="d-flex flex-column align-items-center text-center soft-clickable-segment">
            <span><i class="bi bi-book"></i> {% trans 'View Law of Root' %}</span>
          </a>
        </div>
      {% endif %}

      {% if available_faq %}
        <div class="col-6 col-md d-flex justify-content-center align-items-center">
          <a href="{% url 'expansion-faq' expansion_slug=expansion.slug language_code=language_code %}"
             class="d-flex flex-column align-items-center text-center soft-clickable-segment">
            <span><i class="bi bi-info-circle"></i> {% trans 'View FAQ' %}</span>
          </a>
        </div>
      {% endif %}

    </div>
</div>
  </article>
  {% endif %}
