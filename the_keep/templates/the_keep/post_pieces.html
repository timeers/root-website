{% extends 'the_keep/base.html' %}
{% load i18n %}

{% block title %}{% trans 'Components' %} - {{ object.title }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 root-title"><i class="bi bi-puzzle me-2"></i>{{ object.title }} {% trans 'Components' %}</h2>
        <a href="{% url 'post-settings' object.slug %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>{% trans 'Back to Settings' %}
        </a>
    </div>

    {% include 'the_keep/partials/pieces.html' %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var editButton = document.getElementById('edit-button');
        if (editButton) {
            editButton.click();
        }
    });
</script>
{% endblock %}
